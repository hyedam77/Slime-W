  <script>
  // (1) 보이는 뷰포트 높이에 맞춰 게임 영역 크기 조정 (인앱 브라우저/콘솔로 하단 잘림 방지)
  (function () {
    function fit() {
      var vv = window.visualViewport;
      var hgt = (vv && vv.height) || window.innerHeight || document.documentElement.clientHeight;
      var c = document.getElementById('game-container');
      if (c) c.style.height = Math.round(hgt) + 'px';
    }
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', fit);
      window.visualViewport.addEventListener('scroll', fit);
    }
    window.addEventListener('resize', fit);
    window.addEventListener('orientationchange', function(){ setTimeout(fit, 200); });
    fit();
    window.__fitViewport = fit;
  })();

  // (2) 실행 오류를 화면 하단에 표시 (디버그)
  (function () {
    var last = '', count = 0;
    function show(txt) {
      var b = document.getElementById('errbar');
      if (!b) return;
      if (txt === last) { count++; } else { last = txt; count = 1; }
      b.style.display = 'block';
      b.textContent = txt + (count > 1 ? '  (×' + count + ')' : '');
    }
    window.__showErr = show;
    window.addEventListener('error', function (e) {
      var m = (e.error && e.error.stack) || e.message || 'error';
      show('⚠️ ' + m + (e.filename ? '\n@ ' + e.filename.split('/').pop() + ':' + e.lineno + ':' + e.colno : ''));
    });
    window.addEventListener('unhandledrejection', function (e) {
      show('⚠️ (promise) ' + ((e.reason && (e.reason.stack || e.reason.message)) || e.reason));
    });
    // console.error도 가로채 상세 메시지 노출 (게임 내부 try/catch가 잡은 진짜 오류가 여기로 옴)
    var _ce = console.error;
    console.error = function () {
      try {
        var parts = [];
        for (var i = 0; i < arguments.length; i++) {
          var a = arguments[i];
          parts.push(a && a.stack ? a.stack : (a && a.message ? a.message : String(a)));
        }
        show('🐞 ' + parts.join(' '));
      } catch (_) {}
      return _ce.apply(console, arguments);
    };
  })();

  // (3) 엔진 로드 실패(모든 CDN 차단) 시 안내
  if (!window.Phaser) {
    var el = document.getElementById('loading');

  }

  // (4) 감시: 일정 시간 내 게임이 시작되지 않으면(카카오톡 파일뷰어 등) 안내 표시
  setTimeout(function () {

  }, 3500);

// ===== js/data/WaveData.js =====
// ============================================================
// WaveData — 웨이브 1~10 정의 [Task #7] (GPT 밸런스 조정 지점)
//
// pattern (스폰 배치 — 마법 선택의 재미를 만드는 핵심):
//   scatter : 사방 무작위 산개   → 체인 라이트닝이 유리
//   ring    : 플레이어 포위      → 위치 선정 압박
//   cluster : 한 방향에 뭉침     → 파이어볼이 유리
//   stream  : 한 방향에서 일렬   → 아이스 스피어가 유리
//   mixed   : cluster/scatter 교차
//
// count: 총 스폰 수 / batch: 한 번에 스폰 수 / interval: 배치 간격(초)
// 마지막 웨이브(10)는 보스전.
// ============================================================
const WaveData = {
  countdown: 3,          // 다음 웨이브 시작 카운트(초)
  firstSpawnDelay: 1.4,  // 웨이브 배너 후 첫 스폰까지(초)
  clearDelay: 0.9,       // 전멸 후 강화 선택까지(초)
  waveClearBonus: 30,    // 점수: 웨이브 번호 × 이 값
  bossBonus: 500,

  waves: [
    { count: 5,  batch: 2, interval: 1.00, pattern: 'scatter' }, // 1 몸풀기
    { count: 7,  batch: 2, interval: 0.90, pattern: 'ring'    }, // 2 포위 맛보기
    { count: 9,  batch: 3, interval: 0.90, pattern: 'cluster' }, // 3 파이어볼 각
    { count: 11, batch: 3, interval: 0.85, pattern: 'stream'  }, // 4 아이스 각
    { count: 13, batch: 3, interval: 0.80, pattern: 'mixed'   }, // 5 중간 고비
    { count: 15, batch: 4, interval: 0.80, pattern: 'ring'    }, // 6
    { count: 17, batch: 4, interval: 0.75, pattern: 'cluster' }, // 7
    { count: 19, batch: 4, interval: 0.70, pattern: 'stream'  }, // 8
    { count: 22, batch: 5, interval: 0.65, pattern: 'scatter' }, // 9 최대 혼돈
    { boss: 'goblinKing' },                                      // 10 보스전
  ],

  // 웨이브별 적 강화 (고블린 기본치에 곱/합산)
  mods(w) {
    return {
      hpMul: 1 + 0.16 * (w - 1),          // 10웨이브 ≈ ×2.44
      dmgAdd: Math.floor((w - 1) / 3),    // 3웨이브마다 +1
      speedAdd: (w - 1) * 3,              // 조금씩 빨라짐
    };
  },

  // 스폰 거리 (플레이어 기준)
  spawnDist: { min: 300, max: 480, safe: 260 },
};

  ],
  FLOWER: [
    '.f.f.',
    'f.o.f',
    '.f.f.',
    '..g..',
  ],

  // 그리드 → 텍스처. outline=true면 캐릭터 주변에 1px 외곽선 자동 생성
  makeTexture(scene, key, grid, outline = true) {
    if (scene.textures.exists(key)) return;
    const h = grid.length, w = grid[0].length;
    const pad = outline ? 1 : 0;
    const canvas = scene.textures.createCanvas(key, w + pad * 2, h + pad * 2);
    const ctx = canvas.getContext();

    const filled = (x, y) =>
      x >= 0 && y >= 0 && x < w && y < h && grid[y][x] !== '.';

    if (outline) {
      ctx.fillStyle = this.OUTLINE;
      for (let y = -1; y <= h; y++) for (let x = -1; x <= w; x++) {
        if (filled(x, y)) continue;
        if (filled(x + 1, y) || filled(x - 1, y) || filled(x, y + 1) || filled(x, y - 1)) {
          ctx.fillRect(x + pad, y + pad, 1, 1);
        }
      }
    }
    for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
      const c = grid[y][x];
      if (c === '.') continue;
      ctx.fillStyle = this.PALETTE[c] || '#ff00ff';
      ctx.fillRect(x + pad, y + pad, 1, 1);
    }
    canvas.refresh();
  },

  // 게임에서 쓰는 텍스처 일괄 생성 (BootScene에서 호출)
  generateAll(scene) {
    this.makeTexture(scene, 'slime', this.SLIME_BASE);
    this.makeTexture(scene, 'slime_blink', this.SLIME_BLINK);
    this.makeTexture(scene, 'title_hat', this.TITLE_HAT);
    this.makeTexture(scene, 'title_body', this.TITLE_BODY);
    this.makeTexture(scene, 'title_body_blink', this.TITLE_BODY_BLINK);
    this.makeTexture(scene, 'grass', this.GRASS, false);
    this.makeTexture(scene, 'flower', this.FLOWER, false);
    this.makeTexture(scene, 'goblin_a', this.GOBLIN_A);
    this.makeTexture(scene, 'goblin_b', this.GOBLIN_B);
    this.makeTexture(scene, 'goblin_king', this.GOBLIN_KING);
    this.makeTexture(scene, 'missile', this.MISSILE);
    this.makeTexture(scene, 'fireball', this.FIREBALL);
    this.makeTexture(scene, 'icespear', this.ICESPEAR);
    this.makeTexture(scene, 'bolt', this.BOLT);
    this.makeTexture(scene, 'dummy', this.DUMMY);
    this.makeTexture(scene, 'px', this.PX, false);

    // 스프라이트 텍스처만 NEAREST(픽셀 선명). 텍스트는 전역 LINEAR 유지 → 한글 선명.
    // (1 = Phaser.Textures.FilterMode.NEAREST)
    const pixelKeys = ['slime', 'slime_blink', 'title_hat', 'title_body', 'title_body_blink',
      'grass', 'flower', 'goblin_a', 'goblin_b', 'goblin_king',
      'missile', 'fireball', 'icespear', 'bolt', 'dummy', 'px'];
    for (const k of pixelKeys) {
      const tex = scene.textures.get(k);
      if (tex && tex.setFilter) tex.setFilter(1);
    }
  },
};

// ===== js/core/GameState.js =====
// ============================================================
// GameState — 앱 전역 상태 (싱글톤)
// persistent: 저장 대상 / run: 런 종료 시 초기화
// ============================================================
const GameState = {
  persistent: {
    highestStage: 0,
    bestScore: 0,
    bestWave: 0,
    settings: { sound: true },
  },
  run: null,

  newRun() {
    // 마법별 강화 배율 (UpgradeData의 마법 연마가 수정)
    const magicMods = {};
    for (const k of MagicOrder) {
      magicMods[k] = { dmgMul: 1, cdMul: 1, radiusMul: 1, pierceAdd: 0, jumpsAdd: 0 };
    }
    this.run = {
      stage: 1,
      wave: 0,
      score: 0,
      kills: 0,
      // 강화로 변하는 스탯 (SkillManager가 수정)
      stats: {
        damageMul: 1, cooldownMul: 1, speedMul: 1, bonusHp: 0,
        critChance: 0.05, critMul: 1.5,   // 치명타 기본치
        magicMods,
      },
      upgrades: [],          // 선택 이력 (id 순서대로)
      upgradeLevels: {},     // id → 현재 레벨
      pendingEvolutions: [], // 각성 달성한 진화 id (다음 버전에서 진짜 진화로 소비)
    };
    return this.run;
  },

  // 마법별 강화 배율 조회 (런 밖에서도 안전한 기본값)
  magicMod(key) {
    if (this.run && this.run.stats.magicMods[key]) return this.run.stats.magicMods[key];
    return { dmgMul: 1, cdMul: 1, radiusMul: 1, pierceAdd: 0, jumpsAdd: 0 };
  },

  endRun() {
    if (!this.run) return;
    if (this.run.score > this.persistent.bestScore) this.persistent.bestScore = this.run.score;
    if (this.run.wave > this.persistent.bestWave) this.persistent.bestWave = this.run.wave;
    if (this.run.stage > this.persistent.highestStage) this.persistent.highestStage = this.run.stage;
    SaveManager.save();
    this.run = null;
  },
};


// ===== js/magic/Magic.js =====
// ============================================================
// Magic — 마법 1종의 런타임 상태 [GPT 요청 ⑤⑧]
// 데이터(MagicData)와 시전 로직을 연결. 쿨다운을 스스로 관리한다.
// 계층: Magic → (MagicManager가 생성) Projectile → Explosion → StatusEffect
// ============================================================
class Magic {
  constructor(key) {
    this.key = key;
    this.data = MagicData[key];
    this.cooldownLeft = 0;
  }
  update(dt) { this.cooldownLeft = Math.max(0, this.cooldownLeft - dt); }
  get ready() { return this.cooldownLeft <= 0; }
  startCooldown(mul = 1) { this.cooldownLeft = this.data.cooldown * mul; }
}


// ===== js/magic/MagicBook.js =====
// ============================================================
// MagicBook — 플레이어가 보유/장착한 마법 [Task #7: 습득제]
//
// 시작은 매직 미사일 1개만. 나머지는 강화 선택으로 "습득"(add)한다.
// "마법책이 페이지로 채워진다" 컨셉.
// ============================================================
class MagicBook {
  constructor(startKeys = ['magicMissile']) {
    this.magics = startKeys.map(k => new Magic(k));
    this.activeIndex = 0;
  }
  get active() { return this.magics[this.activeIndex]; }
  get keys() { return this.magics.map(m => m.data.__key); }

  owns(key) { return this.magics.some(m => m.data.__key === key); }

  // 새 마법 습득 (강화에서 호출). 이미 있으면 무시.
  add(key) {
    if (this.owns(key)) return false;
    this.magics.push(new Magic(key));
    return true;
  }

  setActive(i) {
    this.activeIndex = Phaser.Math.Clamp(i, 0, this.magics.length - 1);
    return this.active;
  }
  setActiveByKey(key) {
    const i = this.magics.findIndex(m => m.data.__key === key);
    if (i >= 0) this.activeIndex = i;
    return this.active;
  }
  cycle(dir = 1) {
    this.activeIndex = (this.activeIndex + dir + this.magics.length) % this.magics.length;
    return this.active;
  }
  update(dt) { for (const m of this.magics) m.update(dt); }
}


// ===== js/entities/Projectile.js =====
// ============================================================
// Projectile — 마법 발사체 (풀링). 마법별 텍스처/특성을 data에서 읽음
// 트윈 미사용: 팝인 스케일을 step()에서 수식 처리
// ============================================================
class Projectile extends Phaser.GameObjects.Sprite {
  constructor(scene) {
    super(scene, 0, 0, 'missile');
    scene.add.existing(this);
    this.setDepth(15);
    this.setActive(false).setVisible(false);
  }

  fire(x, y, dx, dy, data, damageMul, opts = {}) {
    const charged = !!opts.charged;
    const ch = opts.magicCharge || {};   // 마법별 charge 설정

    this.magicKey = opts.magicKey;
    this.charged = charged;
    this.popT = 0;
    this.spin = !!data.spin;

    // 차지 배율 (마법별). 없으면 기본값.
    const dmgMul   = charged ? (ch.dmgMul   || 2.0) : 1;
    const radiusMul= charged ? (ch.radiusMul|| 1.3) : 1;
    const widthMul = charged ? (ch.widthMul || 1.0) : 1;   // 관통 판정폭
    const pierceAdd= charged ? (ch.pierceAdd|| 0)   : 0;

    this.baseScale = (data.scale || 3) * (charged ? Math.max(radiusMul, widthMul, 1.3) : 1);
    this.setTexture(data.texture || 'missile');
    this.setPosition(x, y);
    const spd = data.speed * (charged ? 1.1 : 1);
    this.vx = dx * spd;
    this.vy = dy * spd;
    this.damage = data.damage * damageMul * dmgMul;
    this.radius = data.radius * radiusMul * widthMul;
    this.life = data.lifetime;
    this.pierceLeft = (data.pierce || 0) + pierceAdd + (opts.modPierceAdd || 0)
                      + (charged && !data.pierce ? 1 : 0);
    this.hitSet = new Set();

    this.rotation = Math.atan2(dy, dx);
    this.setTint(charged ? 0xffffff : (data.tint || 0xffffff));
    this.setScale(this.baseScale * 0.7);
    this.setActive(true).setVisible(true);
  }

  step(dt) {
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.life -= dt;
    if (this.spin) this.rotation += dt * 10;

    if (this.popT < 1) {
      this.popT = Math.min(1, this.popT + dt / 0.09);
      this.setScale(this.baseScale * (0.7 + 0.3 * this.popT));
    }
    if (this.life <= 0) this.despawn();
  }

  despawn() { this.setActive(false).setVisible(false); }
}


// ===== js/entities/Player.js =====
// ============================================================
// Player — 슬라임 마법사 [Task #3 v5: 관성 전단(shear) 변형]
//
// 비주얼 구조:
//  - root(this): 논리 위치
//  - visual: 스쿼시/스트레치/트레일이 적용되는 컨테이너
//  - slices[5]: 같은 텍스처를 가로 5단으로 crop한 스프라이트들.
//      관성에 따라 윗단일수록 뒤로 처지게 x 오프셋 → 몸이 '휘는' 비대칭 변형.
//      바닥 단은 항상 고정(접지감). 회전은 사용하지 않는다.
//  - 전단값은 스프링(질량-감쇠)으로 구동 → 급정거/방향 전환 시
//      윗부분이 관성으로 출렁 넘어갔다가 되돌아온다.
// 참고: 좌우 반전(flip)은 사용하지 않는다. 슬라임 얼굴이 대칭이고,
//      하이라이트 광원 방향은 고정이 맞으며, crop+flip 조합 버그도 피한다.
// ============================================================
class Player extends Phaser.GameObjects.Container {
  constructor(scene, x, y) {
    super(scene, x, y);
    scene.add.existing(this);
    this.setDepth(10);

    // 그림자 (전단의 영향을 받지 않는 접지 기준)
    this.shadow = scene.add.ellipse(0, 2, 44, 12, 0x000000, 0.22);
    this.add(this.shadow);

    // ---- 슬라이스 조립 ----
    this.visual = scene.add.container(0, 4);
    this.add(this.visual);

    const src = scene.textures.get('slime').getSourceImage();
    this.texW = src.width; this.texH = src.height;
    const K = 5;
    this.slices = [];
    for (let i = 0; i < K; i++) {
      const top = Math.round(this.texH * i / K);
      const bot = Math.round(this.texH * (i + 1) / K);
      const sp = scene.add.sprite(0, 0, 'slime').setOrigin(0.5, 1).setScale(4);
      sp.setCrop(0, top, this.texW, bot - top);
      // 윗단일수록 크게 처짐 (바닥 단은 0 = 접지 고정)
      const factor = Math.pow(1 - i / (K - 1), 1.25);
      this.visual.add(sp);
      this.slices.push({ sp, top, bot, factor });
    }

    // 이동 상태
    this.vx = 0; this.vy = 0;
    this.state = 'idle';
    this.wobbleT = 0;
    this.transitionTween = null;

    // 전단 스프링 상태
    this.shear = 0;       // 현재 전단(px, 윗단 기준)
    this.shearVel = 0;

    // 마지막 이동 방향 (적이 없을 때 발사 방향 폴백)
    this.lastDir = { x: 0, y: -1 };

    this._scheduleBlink();

    this.hp = PlayerData.maxHp;
    this.maxHp = PlayerData.maxHp;
    this.magicBook = new MagicBook();
    // 무적/피격
    this.invT = 0;          // 무적 잔여(초)
    this.hurtFlashT = 0;
  }

  // ---------- 매 프레임 ----------
  update(dt, input) {
    const F = PlayerData.feel;
    const speed = PlayerData.moveSpeed *
      ((GameState.run && GameState.run.stats.speedMul) || 1);   // 강화 반영

    // 마법 쿨다운 갱신 (누락 시 첫 발 이후 영구 정지 → 반드시 매 프레임 호출)
    this.magicBook.update(dt);

    // 무적/피격 플래시 감쇠 + 무적 중 깜빡임
    if (this.invT > 0) {
      this.invT -= dt;
      // 무적 깜빡임: 슬라이스 전체 알파 + 붉은 틴트 점멸
      const blink = Math.sin(this.invT * 28) > 0;
      const a = blink ? 0.35 : 0.9;
      for (const sl of this.slices) {
        sl.sp.setAlpha(a);
        if (blink) sl.sp.setTint(0xff8888); else sl.sp.clearTint();
      }
      if (this.invT <= 0) {
        for (const sl of this.slices) { sl.sp.setAlpha(1); sl.sp.clearTint(); }
      }
    }

    // 1) 속도 지수 보간 (프레임 독립)
    const tx = (input ? input.x : 0) * speed;
    const ty = (input ? input.y : 0) * speed;
    const hasInput = Math.hypot(tx, ty) > 1;
    const tau = hasInput ? F.accelTime : F.decelTime;
    const k = 1 - Math.exp(-dt / tau);
    this.vx += (tx - this.vx) * k;
    this.vy += (ty - this.vy) * k;

    // 2) 위치 + 경계
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    const B = BalanceData.field, m = 30;
    this.x = Phaser.Math.Clamp(this.x, m, B.width - m);
    this.y = Phaser.Math.Clamp(this.y, m, B.height - m);

    // 3) 상태 전환
    const spd = Math.hypot(this.vx, this.vy);
    const speedRatio = spd / speed;
    if (spd > 40) { this.lastDir.x = this.vx / spd; this.lastDir.y = this.vy / spd; }
    if (this.state === 'idle' && hasInput) this._enterMoving();
    else if (this.state === 'moving' && !hasInput && speedRatio < 0.05) this._enterIdle();

    // 4) 관성 전단 스프링 (항상 동작 — 정지 후에도 출렁이며 복원)
    //    이동 방향의 반대로 윗부분이 처진다
    const sr2 = speedRatio * speedRatio;
    const shearTarget = -(this.vx / speed) * F.shearAmp * (0.35 + 0.65 * speedRatio);
    const w = F.shearFreq;
    const c = 2 * F.shearDamp * w;
    this.shearVel += ((shearTarget - this.shear) * w * w - this.shearVel * c) * dt;
    this.shear += this.shearVel * dt;
    for (const sl of this.slices) sl.sp.x = this.shear * sl.factor;

    // 5) 스쿼시/스트레치/트레일
    if (!this.transitionTween) {
      if (this.state === 'moving') {
        this.wobbleT += dt * F.wobbleFreq * Math.PI * 2;
        const wob = Math.sin(this.wobbleT);
        const calm = 1 - speedRatio * 0.7;
        const wobAmt = F.wobbleAmp * speedRatio * calm;

        const nx = spd > 1 ? Math.abs(this.vx) / spd : 0;
        const ny = spd > 1 ? Math.abs(this.vy) / spd : 0;
        const st = F.stretchAmp * sr2;
        const sx = 1 + st * nx - st * ny * 0.5 - wob * wobAmt;
        const sy = 1 + st * ny * 0.9 - st * nx * 0.5 + wob * wobAmt;
        this.visual.setScale(sx, sy);

        // 몸 전체 트레일 (전단과 합쳐져 '앞은 붙고 뒤가 늘어지는' 형태)
        const dX = spd > 1 ? this.vx / spd : 0;
        const dY = spd > 1 ? this.vy / spd : 0;
        const lk = Math.min(1, dt * 14);
        this.visual.x += (-dX * F.trailAmp * sr2 - this.visual.x) * lk;
        this.visual.y = 4 + (-dY * F.trailAmp * sr2 * 0.7)
                          - Math.max(0, wob) * F.hopAmp * speedRatio * calm;
        this.shadow.setScale(1 - Math.max(0, wob) * 0.10 * speedRatio * calm, 1);
      } else {
        // idle 숨쉬기 + 트레일 복귀 (전단은 4번 스프링이 알아서 복원)
        this.wobbleT += dt * 2.4;
        const b = Math.sin(this.wobbleT) * 0.025;
        this.visual.setScale(1 - b, 1 + b);
        const rk = Math.min(1, dt * 10);
        this.visual.x += (0 - this.visual.x) * rk;
        this.visual.y = 4;
        this.shadow.setScale(1, 1);
      }
    }
  }

  // ---------- HP 강화/회복 (Task #7) ----------
  effectiveMaxHp() {
    return PlayerData.maxHp + ((GameState.run && GameState.run.stats.bonusHp) || 0);
  }
  // bonusHp 강화 반영: 최대치가 늘면 늘어난 만큼 현재 HP도 올림
  applyBonusHp() {
    const max = this.effectiveMaxHp();
    if (max > this.maxHp) this.hp += (max - this.maxHp); // 증가분만큼 회복
    this.maxHp = max;
    this.hp = Math.min(this.hp, this.maxHp);
  }
  healBy(amount) {
    this.hp = Math.min(this.effectiveMaxHp(), this.hp + amount);
    SoundManager.heal();
    // 회복 파티클
    if (this.scene.fxBurst) this.scene.fxBurst.emitParticleAt(this.x, this.y - 20, 8);
  }

  // ---------- 상태 전환 ----------
  _enterMoving() {
    this.state = 'moving';
    this._killTransition();
    const F = PlayerData.feel;
    this.visual.setScale(2 - F.startSquash, F.startSquash);
    this.transitionTween = this.scene.tweens.add({
      targets: this.visual, scaleX: 1, scaleY: 1,
      duration: 110, ease: 'Sine.Out',
      onComplete: () => { this.transitionTween = null; },
    });
  }

  _enterIdle() {
    this.state = 'idle';
    this._killTransition();
    const F = PlayerData.feel;
    this.visual.setScale(1.22, 0.78);
    this.transitionTween = this.scene.tweens.add({
      targets: this.visual, scaleX: 1, scaleY: 1,
      duration: F.stopBounceTime, ease: 'Elastic.Out', easeParams: [1.4, 0.45],
      onComplete: () => { this.transitionTween = null; },
    });
  }

  _killTransition() {
    if (this.transitionTween) { this.transitionTween.stop(); this.transitionTween = null; }
  }

  // ---------- 피격 ----------
  takeDamage(dmg, fromX, fromY) {
    if (this.invT > 0) return false;   // 무적 중 무시
    this.hp = Math.max(0, this.hp - dmg);
    this.invT = PlayerData.invincibleTime;

    // 피격 반동: 맞은 반대로 전단 임펄스 + 넉백 약간
    const dx = this.x - fromX;
    this.shearVel += Math.sign(dx || 1) * 200;

    if (this.scene.onPlayerDamaged) this.scene.onPlayerDamaged(this.hp);
    return true;
  }

  // ---------- 시전 반동 ----------
  castRecoil(dx, dy, charged = false) {
    // 발사 반대 방향으로 몸 윗부분이 젖혀지는 반동 (전단 스프링에 임펄스)
    this.shearVel += -dx * (charged ? 620 : 300);
  }

  // ---------- 블링크 ----------
  _scheduleBlink() {
    const F = PlayerData.feel;
    const delay = Phaser.Math.FloatBetween(F.blinkMin, F.blinkMax) * 1000;
    this.scene.time.delayedCall(delay, () => {
      if (!this.active) return;
      this._setAllTexture('slime_blink');
      this.scene.time.delayedCall(120, () => {
        if (!this.active) return;
        this._setAllTexture('slime');
        this._scheduleBlink();
      });
    });
  }

  _setAllTexture(key) {
    for (const sl of this.slices) {
      sl.sp.setTexture(key);
      sl.sp.setCrop(0, sl.top, this.texW, sl.bot - sl.top); // setTexture 후 crop 재적용 필수
    }
  }
}


// ===== js/entities/Enemy.js =====
// ============================================================
// Enemy — 적 기본 클래스 [상속 구조: Melee / Ranged / Boss]
// 공통: HP, 피격(넉백/플래시/스프링 휘청), 사망 연출
// 모든 연출은 수식/스프링 기반 (일반 피격 트윈 0개 — 성능)
// ============================================================
class Enemy extends Phaser.GameObjects.Container {
  constructor(scene, x, y, data) {
    super(scene, x, y);
    scene.add.existing(this);
    this.setDepth(9);

    this.data0 = data;
    this.hpMax = data.hp;
    this.hp = data.hp;
    this.radius = data.radius;
    this.speed = data.speed;
    this.dmg = data.damage;   // 웨이브 스케일링으로 덮어씀 (data0 직접 사용 금지)
    this.alive = true;
    this.dying = false;

    // 넉백 속도 (마찰로 감쇠)
    this.kvx = 0; this.kvy = 0;

    // 피격 연출 상태 (수식)
    this.flashT = 0;
    this.wobble = 0; this.wobbleVel = 0;

    // 접촉 공격 쿨다운
    this.touchCd = 0;

    // 둔화 상태
    this.slowFactor = 1;
    this.slowT = 0;
  }

  applySlow(factor, duration) {
    // 더 강한 둔화로 갱신, 지속시간 리셋
    this.slowFactor = Math.min(this.slowFactor, factor);
    this.slowT = Math.max(this.slowT, duration);
  }

  // 하위 클래스가 스프라이트/그림자/HP바를 붙인 뒤 호출
  _initVisual(textureKey) {
    this.shadow = this.scene.add.ellipse(0, 2, this.radius * 2.2, this.radius * 0.6, 0x000000, 0.2);
    this.sprite = this.scene.add.sprite(0, 4, textureKey).setOrigin(0.5, 1).setScale(this.data0.scale);
    this.hpBar = this.scene.add.graphics();
    this.add([this.shadow, this.sprite, this.hpBar]);
    this._drawHp();
  }

  _drawHp() {
    const g = this.hpBar; g.clear();
    if (this.hp >= this.hpMax) return; // 풀피면 숨김 (화면 깔끔)
    const w = this.radius * 2.4, h = 4, y = -this.radius * 3.2;
    g.fillStyle(0x2b2140, 0.8).fillRect(-w / 2 - 1, y - 1, w + 2, h + 2);
    const ratio = Math.max(0, this.hp / this.hpMax);
    const col = ratio > 0.5 ? 0x6fdc8c : (ratio > 0.25 ? 0xffcc55 : 0xff6b6b);
    g.fillStyle(col, 1).fillRect(-w / 2, y, w * ratio, h);
  }

  // 공통 물리/연출 갱신. 하위 클래스는 _ai(dt, player)만 구현
  update(dt, player) {
    if (this.dying) { this._updateDeath(dt); return; }
    if (!this.alive) return;

    // 넉백 감쇠 이동
    this.x += this.kvx * dt;
    this.y += this.kvy * dt;
    const fr = Math.exp(-dt / 0.12);
    this.kvx *= fr; this.kvy *= fr;

    // 넉백이 약해지면 AI 이동 허용 (맞는 중엔 밀림 우선)
    const knockActive = Math.hypot(this.kvx, this.kvy) > 30;
    if (!knockActive) this._ai(dt, player);

    // 필드 경계
    const B = BalanceData.field, m = 20;
    this.x = Phaser.Math.Clamp(this.x, m, B.width - m);
    this.y = Phaser.Math.Clamp(this.y, m, B.height - m);

    if (this.touchCd > 0) this.touchCd -= dt;

    // 둔화 타이머
    if (this.slowT > 0) {
      this.slowT -= dt;
      if (this.slowT <= 0) { this.slowFactor = 1; if (this.flashT <= 0) this.sprite.clearTint(); }
      else if (this.flashT <= 0) this.sprite.setTint(0x9fd8ff); // 얼어붙은 색
    }

    // 스프링 휘청 복원
    const w = 22, c = 2 * 0.35 * w;
    this.wobbleVel += (-this.wobble * w * w - this.wobbleVel * c) * dt;
    this.wobble += this.wobbleVel * dt;
    this.sprite.rotation = this.wobble;

    // 플래시 감쇠
    if (this.flashT > 0) { this.flashT -= dt; if (this.flashT <= 0) this.sprite.clearTint(); }

    this._animate(dt);
  }

  _ai(dt, player) {}      // 하위 구현
  _animate(dt) {}         // 하위 구현

  takeDamage(dmg, fromX, fromY, charged = false, kdx = null, kdy = null) {
    if (!this.alive || this.dying) return;
    this.hp -= dmg;
    this._drawHp();

    // 흰 플래시
    this.sprite.setTintFill(0xffffff);
    this.flashT = charged ? 0.1 : 0.06;

    // 넉백 방향: 투사체 진행방향(kdx,kdy) 우선, 없으면 좌표차 폴백
    let nx, ny;
    if (kdx !== null && (kdx !== 0 || kdy !== 0)) {
      nx = kdx; ny = kdy;
    } else {
      const dx = this.x - fromX, dy = this.y - fromY;
      const d = Math.hypot(dx, dy) || 1;
      nx = dx / d; ny = dy / d;
    }
    const power = this.data0.knockback * (charged ? 2.2 : 1);
    this.kvx += nx * power;
    this.kvy += ny * power;

    // 휘청 임펄스 (수평 성분 기준)
    const dir = Math.sign(nx) || 1;
    this.wobbleVel += dir * (charged ? 9 : 4);

    if (this.hp <= 0) this._startDeath(nx, ny, charged);
  }

  _startDeath(nx, ny, charged) {
    this.dying = true;
    this.alive = false;
    this.deathT = 0;
    this._drawHp();

    // 사망 연출: 넉백 방향으로 튀어오르며 회전
    this.deathVx = nx * 140;
    this.deathVy = -180;
    this.deathSpin = (Math.random() < 0.5 ? -1 : 1) * 8;

    this.scene.fxBurst.emitParticleAt(this.x, this.y - this.radius, charged ? 20 : 12);
    SoundManager.pop();

    // 점수/처치 알림 (매니저가 집계)
    if (this.scene.onEnemyKilled) this.scene.onEnemyKilled(this);
  }

  _updateDeath(dt) {
    this.deathT += dt;
    this.deathVy += 900 * dt;                 // 중력
    this.x += this.deathVx * dt;
    this.y += this.deathVy * dt;
    this.sprite.rotation += this.deathSpin * dt;
    const a = Math.max(0, 1 - this.deathT / 0.5);
    this.setAlpha(a);
    this.setScale(a);                          // 쪼그라들며 사라짐
    if (this.deathT >= 0.5) this._remove();
  }

  _remove() {
    this.destroyed = true;
    this.destroy();
  }
}

// ============================================================
// GoblinEnemy — 근접 추적 몬스터 [Task #5]
// AI: 플레이어를 향해 직진 추적 → 접촉 시 데미지
// ============================================================
class GoblinEnemy extends Enemy {
  constructor(scene, x, y, mods = {}) {
    super(scene, x, y, EnemyData.goblin);
    // 웨이브 스케일링 (WaveData.mods)
    if (mods.hpMul) { this.hpMax = Math.round(this.hpMax * mods.hpMul); this.hp = this.hpMax; }
    if (mods.dmgAdd) this.dmg += mods.dmgAdd;
    if (mods.speedAdd) this.speed += mods.speedAdd;
    this._initVisual('goblin_a');
    this.walkT = Math.random() * 10;
    this.facing = 1;
  }

  _ai(dt, player) {
    if (!player || !player.active) return;
    const dx = player.x - this.x, dy = (player.y - 20) - this.y;
    const d = Math.hypot(dx, dy) || 1;

    // 접촉 사거리 밖이면 추적
    const touchDist = this.radius + PlayerData.bodyRadius + 6;
    if (d > touchDist) {
      const sp = this.speed * this.slowFactor;
      this.x += (dx / d) * sp * dt;
      this.y += (dy / d) * sp * dt;
      if (Math.abs(dx) > 4) { this.facing = dx > 0 ? 1 : -1; this.sprite.setFlipX(this.facing < 0); }
      this.moving = true;
    } else {
      this.moving = false;
      // 접촉 공격
      if (this.touchCd <= 0) {
        this.touchCd = this.data0.touchCooldown;
        if (this.scene.onPlayerHit) this.scene.onPlayerHit(this.dmg, this.x, this.y);
        // 공격 모션: 살짝 돌진하듯 앞으로 튐
        this.wobbleVel += this.facing * 6;
      }
    }
  }

  _animate(dt) {
    // 걷기: 2프레임 토글 + 콩콩 스쿼시
    if (this.moving) {
      this.walkT += dt * 8;
      const frame = Math.floor(this.walkT) % 2 === 0 ? 'goblin_a' : 'goblin_b';
      if (this.sprite.texture.key !== frame && this.flashT <= 0) this.sprite.setTexture(frame);
      const bob = Math.abs(Math.sin(this.walkT * Math.PI));
      this.sprite.setScale(this.data0.scale * (1 + bob * 0.04), this.data0.scale * (1 - bob * 0.04));
    } else {
      this.sprite.setScale(this.data0.scale, this.data0.scale);
    }
  }
}

// ============================================================
// BossGoblinKing — 웨이브 10 보스 [Task #7]
// 패턴:
//   chase  → 느리게 추적. 주기적으로 돌진 준비 / 부하 소환
//   windup → 붉게 점멸하며 부풀어오름 (0.75초 예고 — 피할 시간)
//   dash   → 예고 종료 시점의 플레이어 방향으로 고속 돌진
//   recover→ 잠깐 멈춤 (반격 찬스)
// 연출은 전부 수식 기반 (트윈 없음).
// ============================================================
class BossGoblinKing extends Enemy {
  constructor(scene, x, y) {
    super(scene, x, y, EnemyData.goblinKing);
    this._initVisual('goblin_king');
    this.walkT = 0;
    this.facing = 1;
    this.moving = false;

    this.bstate = 'chase';
    this.stateT = 0;
    this.dashT = this.data0.dashCd * 0.6;  // 첫 돌진은 조금 빨리
    this.summonT = this.data0.summonCd * 0.5;
    this.dashDir = { x: 0, y: 1 };
  }

  _ai(dt, player) {
    if (!player || !player.active) return;
    const D = this.data0;
    this.stateT += dt;

    const dx = player.x - this.x, dy = (player.y - 20) - this.y;
    const d = Math.hypot(dx, dy) || 1;
    const touchDist = this.radius + PlayerData.bodyRadius + 6;

    // 접촉 공격 (모든 상태 공통 — 돌진 중 부딪혀도 아픔)
    if (d < touchDist && this.touchCd <= 0) {
      this.touchCd = D.touchCooldown;
      if (this.scene.onPlayerHit) this.scene.onPlayerHit(this.dmg, this.x, this.y);
      this.wobbleVel += this.facing * 5;
    }

    switch (this.bstate) {
      case 'chase': {
        if (d > touchDist) {
          const sp = this.speed * this.slowFactor;
          this.x += (dx / d) * sp * dt;
          this.y += (dy / d) * sp * dt;
          this.moving = true;
        } else this.moving = false;
        if (Math.abs(dx) > 4) { this.facing = dx > 0 ? 1 : -1; this.sprite.setFlipX(this.facing < 0); }

        // 돌진 타이머
        this.dashT -= dt;
        if (this.dashT <= 0 && d < 620) {
          this.bstate = 'windup'; this.stateT = 0;
          SoundManager.bossGrowl();
        }
        // 소환 타이머
        this.summonT -= dt;
        if (this.summonT <= 0) {
          this.summonT = D.summonCd;
          if (this.scene.waveManager) this.scene.waveManager.bossSummon(this);
        }
        break;
      }
      case 'windup': {
        this.moving = false;
        // 붉은 점멸 + 부풀기 (피격 플래시 중엔 양보)
        if (this.flashT <= 0) {
          const blink = Math.sin(this.stateT * 30) > 0;
          if (blink) this.sprite.setTint(0xff5a5a); else this.sprite.clearTint();
        }
        const puff = 1 + Math.min(1, this.stateT / D.windup) * 0.12;
        this.sprite.setScale(D.scale * puff, D.scale * puff);
        if (this.stateT >= D.windup) {
          // 이 순간의 플레이어 위치로 방향 고정 → 옆으로 피할 수 있다
          this.dashDir.x = dx / d; this.dashDir.y = dy / d;
          this.bstate = 'dash'; this.stateT = 0;
          if (this.flashT <= 0) this.sprite.clearTint();
          this.sprite.setScale(D.scale, D.scale);
          SoundManager.bossDash();
          this.scene.gameFeel.shake(0.004, 120);
        }
        break;
      }
      case 'dash': {
        this.x += this.dashDir.x * D.dashSpeed * dt;
        this.y += this.dashDir.y * D.dashSpeed * dt;
        this.moving = true;
        if (this.stateT >= D.dashTime) { this.bstate = 'recover'; this.stateT = 0; }
        break;
      }
      case 'recover': {
        this.moving = false;
        if (this.stateT >= D.recoverTime) {
          this.bstate = 'chase'; this.stateT = 0;
          this.dashT = D.dashCd;
        }
        break;
      }
    }
  }

  _animate(dt) {
    if (this.bstate === 'windup') return; // windup은 자체 스케일 연출
    if (this.moving) {
      this.walkT += dt * 6;
      const bob = Math.abs(Math.sin(this.walkT * Math.PI));
      this.sprite.setScale(this.data0.scale * (1 + bob * 0.03), this.data0.scale * (1 - bob * 0.03));
    } else {
      // 숨쉬기
      this.walkT += dt * 2;
      const b = Math.sin(this.walkT) * 0.02;
      this.sprite.setScale(this.data0.scale * (1 - b), this.data0.scale * (1 + b));
    }
  }

  takeDamage(dmg, fromX, fromY, charged, kdx, kdy) {
    super.takeDamage(dmg, fromX, fromY, charged, kdx, kdy);
    if (this.scene.hud) this.scene.hud.setBossHp(Math.max(0, this.hp) / this.hpMax);
  }

  _startDeath(nx, ny, charged) {
    // 보스 사망: 더 크고 느리게
    this.deathDurOverride = 1.0;
    super._startDeath(nx, ny, charged);
    this.deathVy = -260;
    this.deathSpin *= 0.6;
    this.scene.fxBurst.emitParticleAt(this.x, this.y - 30, 40);
    this.scene.fxExplosion.emitParticleAt(this.x, this.y - 30, 24);
  }

  _updateDeath(dt) {
    const dur = this.deathDurOverride || 0.5;
    this.deathT += dt;
    this.deathVy += 700 * dt;
    this.x += this.deathVx * dt;
    this.y += this.deathVy * dt;
    this.sprite.rotation += this.deathSpin * dt;
    const a = Math.max(0, 1 - this.deathT / dur);
    this.setAlpha(a);
    this.setScale(a);
    if (this.deathT >= dur) this._remove();
  }
}


// ===== js/managers/SaveManager.js =====
// localStorage 저장/불러오기
const SaveManager = {
  KEY: 'slime-wizard-save-v1',
  save() {
    try { localStorage.setItem(this.KEY, JSON.stringify(GameState.persistent)); } catch (e) {}
  },
  load() {
    try {
      const raw = localStorage.getItem(this.KEY);
      if (raw) Object.assign(GameState.persistent, JSON.parse(raw));
    } catch (e) {}
  },
};


// ===== js/managers/SoundManager.js =====
// ============================================================
// SoundManager — WebAudio 신스 (에셋 파일 없이 합성)
// 마법별로 파형·음정·길이를 달리해 청각적으로 구분되게 함
// iOS: 첫 터치 후 unlock()
// ============================================================
const SoundManager = {
  ctx: null,
  unlock() {
    if (this.ctx) { if (this.ctx.state === 'suspended') this.ctx.resume(); return; }
    try { this.ctx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  },

  _tone(f0, f1, dur, type = 'square', vol = 0.06, delay = 0) {
    if (!this.ctx || !GameState.persistent.settings.sound) return;
    const t = this.ctx.currentTime + delay;
    const osc = this.ctx.createOscillator();
    const gain = this.ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(f0, t);
    osc.frequency.exponentialRampToValueAtTime(Math.max(1, f1), t + dur);
    gain.gain.setValueAtTime(vol, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(gain).connect(this.ctx.destination);
    osc.start(t); osc.stop(t + dur);
  },
  _noise(dur, vol = 0.06) {
    if (!this.ctx || !GameState.persistent.settings.sound) return;
    const t = this.ctx.currentTime;
    const n = Math.floor(this.ctx.sampleRate * dur);
    const buf = this.ctx.createBuffer(1, n, this.ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
    const src = this.ctx.createBufferSource(); src.buffer = buf;
    const g = this.ctx.createGain(); g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.connect(g).connect(this.ctx.destination); src.start(t);
  },

  // 매직 미사일: 짧고 맑은 뿅
  shoot() { this._tone(920, 380, 0.09, 'square', 0.05); },
  hit()   { this._tone(240, 90, 0.07, 'square', 0.07); },

  // 파이어볼: 낮게 부웅 + 명중 시 노이즈 폭발
  fireCast() { this._tone(300, 140, 0.22, 'sawtooth', 0.06); },
  fireHit()  { this._noise(0.28, 0.11); this._tone(120, 40, 0.22, 'sawtooth', 0.07); },

  // 아이스 스피어: 높고 차가운 슈웅 (삼각파)
  iceCast() { this._tone(1500, 700, 0.12, 'triangle', 0.05); },

  waveStart()  { this._tone(520, 780, 0.12, 'square', 0.06); this._tone(780, 1040, 0.14, 'square', 0.06, 0.10); },
