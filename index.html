<body>
  <div id="game-container">
    <div id="loading"><div class="spark"></div><div>슬라임 마법사 불러오는 중…</div></div>
  </div>
  <div id="errbar"></div>

  <script>
  // (1) 보이는 뷰포트 높이에 맞춰 게임 영역 크기 조정 (인앱 브라우저/콘솔로 하단 잘림 방지)
  (function () {
    function fit() {
      var vv = window.visualViewport;
      var hgt = (vv && vv.height) || window.innerHeight || document.documentElement.clientHeight;
      var c = document.getElementById('game-container');
      if (c) c.style.height = Math.round(hgt) + 'px';
    }
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', fit);
      window.visualViewport.addEventListener('scroll', fit);
    }
    window.addEventListener('resize', fit);
    window.addEventListener('orientationchange', function(){ setTimeout(fit, 200); });
    fit();
    window.__fitViewport = fit;
  })();

  // (2) 실행 오류를 화면 하단에 표시 (디버그)
  (function () {
    var last = '', count = 0;
    function show(txt) {
      var b = document.getElementById('errbar');
      if (!b) return;
      if (txt === last) { count++; } else { last = txt; count = 1; }
      b.style.display = 'block';
      b.textContent = txt + (count > 1 ? '  (×' + count + ')' : '');
    }
    window.__showErr = show;
    window.addEventListener('error', function (e) {
      var m = (e.error && e.error.stack) || e.message || 'error';
      show('⚠️ ' + m + (e.filename ? '\n@ ' + e.filename.split('/').pop() + ':' + e.lineno + ':' + e.colno : ''));
    });
    window.addEventListener('unhandledrejection', function (e) {
      show('⚠️ (promise) ' + ((e.reason && (e.reason.stack || e.reason.message)) || e.reason));
    });
    // console.error도 가로채 상세 메시지 노출 (게임 내부 try/catch가 잡은 진짜 오류가 여기로 옴)
    var _ce = console.error;
    console.error = function () {
      try {
        var parts = [];
        for (var i = 0; i < arguments.length; i++) {
          var a = arguments[i];
          parts.push(a && a.stack ? a.stack : (a && a.message ? a.message : String(a)));
        }
        show('🐞 ' + parts.join(' '));
      } catch (_) {}
      return _ce.apply(console, arguments);
    };
  })();

  // (3) 엔진 로드 실패(모든 CDN 차단) 시 안내
  if (!window.Phaser) {
    var el = document.getElementById('loading');
    if (el) el.innerHTML =
      '<div style="font-size:34px">🔌</div>' +
      '<div>게임 엔진을 불러오지 못했어요.<br>인터넷에 연결한 뒤,<br><b>Safari</b> 또는 <b>Chrome</b>에서 열어주세요.<br><span style="opacity:.6;font-size:13px">(카카오톡 등 앱 내 브라우저는 일부 차단될 수 있어요)</span></div>';
  }

  // (4) 감시: 일정 시간 내 게임이 시작되지 않으면(카카오톡 파일뷰어 등) 안내 표시
  setTimeout(function () {
    if (window.__gameStarted) return;
    var el = document.getElementById('loading');
    if (!el) return;
    el.innerHTML =
      '<div style="font-size:34px">📂</div>' +
      '<div>이 화면에서는 게임이 실행되지 않아요.<br>오른쪽 위 <b>···</b> 또는 <b>공유</b> 버튼을 눌러<br><b>Safari</b>(또는 Chrome)로 열어주세요.<br><span style="opacity:.6;font-size:13px">카카오톡 파일 미리보기는 게임 실행을 지원하지 않을 수 있어요.</span></div>';
  }, 3500);
  </script>
