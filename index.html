// ===== js/managers/GameFeelManager.js =====
// ============================================================
// GameFeelManager — 손맛 담당 [GPT 요청 ⑦]
// Camera Shake / Hit Stop / Flash / Slow Motion / Screen Flash
// Task #2: 인터페이스 정의 + shake만 동작 (씬 전환 데모용)
// ============================================================
class GameFeelManager {
  constructor(scene) { this.scene = scene; }

  shake(intensity = 0.005, duration = 100) {
    this.scene.cameras.main.shake(duration, intensity);
  }
  flash(color = 0xffffff, duration = 80) {
    this.scene.cameras.main.flash(duration, (color >> 16) & 255, (color >> 8) & 255, color & 255);
  }
  hitStop(ms = 50) {
    // 짧은 시간 정지 → 타격감. Task #9(Polish)에서 세부 튜닝
    this.scene.physics && (this.scene.physics.world.isPaused = true);
    this.scene.time.delayedCall(ms, () => {
      this.scene.physics && (this.scene.physics.world.isPaused = false);
    });
  }
  slowMotion(scale = 0.3, ms = 300) {
    this.scene.time.timeScale = scale;
    this.scene.tweens.timeScale = scale;
    setTimeout(() => { this.scene.time.timeScale = 1; this.scene.tweens.timeScale = 1; }, ms);
  }
}


// ===== js/managers/MagicManager.js =====
// ============================================================
// MagicManager — 발사체 풀 + 이동/충돌 + 마법별 행동(폭발/둔화/연쇄)
// 모든 특수 행동은 MagicData 필드 유무로 자동 분기 → 새 마법 코드수정 불필요
// ============================================================
class MagicManager {
  constructor(scene) {
    this.scene = scene;
    this.pool = [];
    this.dmgTexts = [];
  }

  cast(magicData, x, y, dx, dy, opts = {}) {
    const p = this._get();
    const mod = GameState.magicMod(magicData.__key);   // 마법별 연마 배율
    const mul = ((GameState.run && GameState.run.stats.damageMul) || 1) * mod.dmgMul;
    p.fire(x, y, dx, dy, magicData.projectile, mul, {
      ...opts, magicKey: magicData.__key, magicCharge: magicData.charge,
      modPierceAdd: mod.pierceAdd,
    });
    p._magic = magicData;
    p._mods = mod;
    // 머즐 파티클 (마법 색상)
    this._emit(x + dx * 26, y + dy * 26, opts.charged ? 8 : 4, magicData.__key);
  }

  update(dt) {
    const enemies = this.scene.enemyManager.enemies;
    for (const p of this.pool) {
      if (!p.active) continue;
      p.step(dt);
      if (!p.active) continue;

      for (const e of enemies) {
        if (!e.alive || p.hitSet.has(e)) continue;
        const d = Math.hypot(e.x - p.x, (e.y - 24) - p.y);
        if (d < e.radius + p.radius) {
          this._onHit(p, e);
          if (!p.active) break;
        }
      }
    }

    // 데미지 텍스트 (수동 애니메이션)
    for (const t of this.dmgTexts) {
      if (!t.obj.active) continue;
      t.life -= dt;
      t.obj.y += t.vy * dt;
      t.obj.setAlpha(Math.max(0, t.life / t.maxLife));
      if (t.life <= 0) t.obj.setActive(false).setVisible(false);
    }
  }

  _onHit(p, enemy) {
    const magic = p._magic;
    const feel = magic.feel;
    const charged = p.charged;
    const dir = { x: p.vx, y: p.vy };
    const pd = Math.hypot(dir.x, dir.y) || 1;

    // 직격 대상 피해 (항상) — 치명타 판정
    const hit = this._crit(p.damage);
    this._dealDamage(enemy, hit.dmg, p.x, p.y, charged || hit.crit, dir.x / pd, dir.y / pd);
    this._showDamage(p.x, p.y - 16, Math.round(hit.dmg), charged, hit.crit);
    if (hit.crit) SoundManager.crit();
    SoundManager[feel.sndHit] && SoundManager[feel.sndHit]();

    if (magic.explosion) {
      // 폭발형: 폭발 연출이 모든 시각효과를 담당 (기본 타격 파티클/셰이크 생략)
      this._explode(p.x, p.y, magic.explosion, feel, charged, magic.charge, p._mods);
    } else {
      // 비폭발형: 기본 타격 이펙트
      this._emit(p.x, p.y, charged ? 16 : feel.hitParticles, magic.__key);
      const shakeAmt = charged ? 0.006 : 0.0022;
      this.scene.gameFeel.shake(shakeAmt, charged ? 130 : 70);
      if (charged) { this.scene.gameFeel.hitStop(45); this.scene.gameFeel.flash(0xffffff, 60); }

      // 둔화(얼음) 마법: 명중 지점에 서리 원이 퍼졌다 사라짐 (얼리는 느낌 강조)
      if (magic.slow) {
        const frost = this.scene.add.circle(p.x, p.y, 10, 0x8fe3ff, 0.45).setDepth(24);
        if (this.scene.worldRoot) this.scene.worldRoot.add(frost);
        this.scene.tweens.add({ targets: frost, radius: 30, alpha: 0, duration: 280,
          ease: 'Cubic.Out', onComplete: () => frost.destroy() });
      }
    }

    // 기타 마법별 행동
    if (magic.slow) this._applySlow(enemy, magic.slow);
    if (magic.chain) this._chain(enemy, p.damage, magic.chain, feel, p.hitSet, charged, magic.charge, p._mods);

    // 관통 처리
    p.hitSet.add(enemy);
    if (p.pierceLeft > 0) { p.pierceLeft--; } else { p.despawn(); }
  }

  _dealDamage(enemy, dmg, fromX, fromY, charged, nx, ny) {
    enemy.takeDamage(dmg, fromX, fromY, charged, nx, ny);
  }

  // ---- 치명타 판정 (UpgradeData의 critChance/critMul) ----
  _crit(dmg) {
    const s = GameState.run && GameState.run.stats;
    if (s && Math.random() < s.critChance) return { dmg: dmg * s.critMul, crit: true };
    return { dmg, crit: false };
  }

  // 웨이브 종료 시 남은 발사체 정리 (강화 선택 중 화면 정지 대비)
  clearProjectiles() {
    for (const p of this.pool) if (p.active) p.despawn();
  }

  // ---- 폭발: 범위 내 모든 적에게 피해 ----
  _explode(x, y, exp, feel, charged, charge, mods) {
    mods = mods || { dmgMul: 1, radiusMul: 1 };
    const rMul = (charged ? ((charge && charge.radiusMul) || 1.5) : 1) * (mods.radiusMul || 1);
    const dMul = (charged ? ((charge && charge.dmgMul) || 1.5) : 1);
    const statMul = ((GameState.run && GameState.run.stats.damageMul) || 1) * (mods.dmgMul || 1);
    const R = exp.radius * rMul;
    const sc = this.scene;

    // (1) 폭발 범위를 보여주는 채운 원 — 실제 R 크기로 나타났다 사라짐
    //     "여기까지 범위"가 눈에 보이도록 반경 R로 시작
    const area = sc.add.circle(x, y, R, 0xff7a2b, 0.35).setDepth(26);
    if (sc.worldRoot) sc.worldRoot.add(area);
    sc.tweens.add({ targets: area, alpha: 0, scale: 1.05, duration: 260, ease: 'Cubic.Out',
      onComplete: () => area.destroy() });

    // (2) 충격파 링 — 얇은 테두리가 R까지 확장 (범위 경계 강조)
    const ring = sc.add.circle(x, y, R * 0.4, 0xffd23f, 0).setStrokeStyle(3, 0xffd23f, 0.8).setDepth(27);
    if (sc.worldRoot) sc.worldRoot.add(ring);
    sc.tweens.add({ targets: ring, radius: R, alpha: 0, duration: 300, ease: 'Cubic.Out',
      onComplete: () => ring.destroy() });

    // (3) 불꽃 파편 (톤다운: 개수 축소)
    sc.fxExplosion.emitParticleAt(x, y, charged ? 24 : 16);

    // (4) 셰이크 (톤다운)
    sc.gameFeel.shake(charged ? 0.008 : 0.005, charged ? 140 : 100);
    if (charged) sc.gameFeel.hitStop(30);

    // (5) 범위 피해 + 폭심에서 바깥으로 넉백 (강화·치명타 반영)
    const dmg = exp.damage * dMul * statMul;
    for (const e of sc.enemyManager.enemies) {
      if (!e.alive) continue;
      const d = Math.hypot(e.x - x, (e.y - 24) - y);
      if (d < R + e.radius) {
        const dx = e.x - x, dy = (e.y - 24) - y, dd = Math.hypot(dx, dy) || 1;
        const falloff = 0.6 + 0.4 * (1 - Math.min(1, d / R));
        const hit = this._crit(dmg * falloff);
        e.takeDamage(hit.dmg, x, y, false, dx / dd, dy / dd);
        if (hit.crit) this._showDamage(e.x, e.y - 30, Math.round(hit.dmg), false, true);
      }
    }
  }

  // ---- 둔화: 적 이동속도 배율 ----
  _applySlow(enemy, slow) {
    enemy.applySlow(slow.factor, slow.duration);
  }

  // ---- 연쇄: 가장 가까운 미타격 적으로 점프 ----
  _chain(fromEnemy, baseDmg, chain, feel, hitSet, charged, charge, mods) {
    const jumps = chain.jumps + (charged ? ((charge && charge.jumpsAdd) || 0) : 0)
                  + ((mods && mods.jumpsAdd) || 0);
    const range = chain.range * (charged ? ((charge && charge.rangeMul) || 1) : 1);
    let current = fromEnemy;
    let dmg = baseDmg * chain.falloff;
    const chained = new Set([fromEnemy]);

    for (let j = 0; j < jumps; j++) {
      let best = null, bd = range;
      for (const e of this.scene.enemyManager.enemies) {
        if (!e.alive || chained.has(e)) continue;
        const d = Math.hypot(e.x - current.x, e.y - current.y);
        if (d < bd) { bd = d; best = e; }
      }
      if (!best) break;

      // 번개 줄기 (선 그리기 후 페이드)
      this._lightningArc(current.x, current.y - 20, best.x, best.y - 20, feel.tint[0]);
      const dx = best.x - current.x, dy = best.y - current.y, dd = Math.hypot(dx, dy) || 1;
      const hit = this._crit(dmg);
      best.takeDamage(hit.dmg, current.x, current.y, false, dx / dd, dy / dd);
      if (hit.crit) this._showDamage(best.x, best.y - 30, Math.round(hit.dmg), false, true);
      this._emit(best.x, best.y - 20, 6, 'chainLightning');
      SoundManager.boltHit && SoundManager.boltHit();

      chained.add(best);
      current = best;
      dmg *= chain.falloff;
    }
  }

  _lightningArc(x1, y1, x2, y2, color) {
    const g = this.scene.add.graphics().setDepth(23);
    if (this.scene.worldRoot) this.scene.worldRoot.add(g);
    g.lineStyle(3, color, 0.9);
    // 지그재그
    const segs = 5;
    g.beginPath(); g.moveTo(x1, y1);
    for (let i = 1; i < segs; i++) {
      const t = i / segs;
      const mx = x1 + (x2 - x1) * t + (Math.random() - 0.5) * 24;
      const my = y1 + (y2 - y1) * t + (Math.random() - 0.5) * 24;
      g.lineTo(mx, my);
    }
    g.lineTo(x2, y2); g.strokePath();
    this.scene.tweens.add({ targets: g, alpha: 0, duration: 180,
      onComplete: () => g.destroy() });
  }

  _emit(x, y, count, emitterKey) {
    const em = (emitterKey && this.scene.fxEmitters[emitterKey]) || this.scene.fxBurst;
    em.emitParticleAt(x, y, count);
  }

  _get() {
    for (const p of this.pool) if (!p.active) return p;
    const np = new Projectile(this.scene);
    if (this.scene.worldRoot) this.scene.worldRoot.add(np);
    this.pool.push(np);
    return np;
  }

  _showDamage(x, y, val, charged, crit = false) {
    let d = this.dmgTexts.find(o => !o.obj.active);
    if (!d) {
      const obj = this.scene.add.text(0, 0, '', {
        fontFamily: 'monospace', fontSize: '18px', color: '#ffe9a8',
        stroke: '#2b2140', strokeThickness: 4, fontStyle: 'bold',
      }).setOrigin(0.5).setDepth(30).setResolution(2);
      if (this.scene.worldRoot) this.scene.worldRoot.add(obj);
      d = { obj, life: 0, maxLife: 0.48, vy: -70 };
      this.dmgTexts.push(d);
    }
    const big = charged || crit;
    d.obj.setText(crit ? `${val}!` : String(val)).setPosition(x, y).setAlpha(1)
      .setActive(true).setVisible(true)
      .setFontSize(big ? 30 : 18)
      .setColor(crit ? '#ffd23f' : (charged ? '#ff7e7e' : '#ffe9a8'));
    d.life = d.maxLife = big ? 0.62 : 0.48;
    d.vy = big ? -95 : -70;
  }
}


// ===== js/managers/EnemyManager.js =====
// ============================================================
// EnemyManager — 적 목록 관리 + 최근접 탐색 + 처치 집계
// ============================================================
class EnemyManager {
  constructor(scene) {
    this.scene = scene;
    this.enemies = [];
    this.killCount = 0;
  }

  spawnGoblin(x, y, mods = {}) {
    const g = new GoblinEnemy(this.scene, x, y, mods);
    if (this.scene.worldRoot) this.scene.worldRoot.add(g);
    this.enemies.push(g);
    // 등장 연출: 작게 튀어나옴
    g.setScale(0.2);
    this.scene.tweens.add({ targets: g, scaleX: 1, scaleY: 1, duration: 260, ease: 'Back.Out' });
    return g;
  }

  spawnBoss(x, y) {
    const b = new BossGoblinKing(this.scene, x, y);
    if (this.scene.worldRoot) this.scene.worldRoot.add(b);
    this.enemies.push(b);
    b.setScale(0.1);
    this.scene.tweens.add({ targets: b, scaleX: 1, scaleY: 1, duration: 500, ease: 'Back.Out' });
    return b;
  }

  // 하이브리드 조준용 최근접 (살아있는 적만)
  nearest(x, y, maxDist = Infinity) {
    let best = null, bd = maxDist;
    for (const e of this.enemies) {
      if (!e.alive) continue;
      const d = Math.hypot(e.x - x, e.y - y);
      if (d < bd) { bd = d; best = e; }
    }
    return best;
  }

  update(dt, player) {
    for (const e of this.enemies) e.update(dt, player);
    // 제거된 적 정리
    this.enemies = this.enemies.filter(e => !e.destroyed);
  }

  get aliveCount() { return this.enemies.filter(e => e.alive).length; }
  // 보스 제외 부하 수 (소환 상한 판단용)
  get minionCount() { return this.enemies.filter(e => e.alive && e.data0.kind !== 'boss').length; }
}


// ===== js/managers/WaveManager.js =====
// ============================================================
// WaveManager — 웨이브 진행 / 스폰 스케줄 / 보스 트리거 [Task #7]
//
// 흐름:
//   startWave(n) → 배너 → 스폰 스케줄(batch/interval/pattern)
//   → 전멸 → onWaveClear → (강화 3택: GameScene) → 카운트다운 → 다음 웨이브
//   웨이브 10 = 보스전 (보스 처치가 종료 조건, 부하는 무시)
// ============================================================
class WaveManager {
  constructor(scene) {
    this.scene = scene;
    this.wave = 0;
    this.def = null;
    this.boss = null;
    this._reset();
  }

  _reset() {
    this.spawned = 0;
    this.spawnT = 0;
    this.batchIdx = 0;
    this.finished = false;
    this.bossSpawned = false;
  }

  get totalWaves() { return WaveData.waves.length; }
  get isBossWave() { return !!(this.def && this.def.boss); }

  startWave(n) {
    this.wave = n;
    if (GameState.run) GameState.run.wave = n;
    this.def = WaveData.waves[n - 1];
    this._reset();
    this.spawnT = WaveData.firstSpawnDelay;

    const hud = this.scene.hud;
    hud.setWaveNum(n, this.totalWaves);

    if (this.isBossWave) {
      hud.announce('B O S S', EnemyData.goblinKing.name, 0xff6b6b);
      SoundManager.bossRoar();
      this.scene.gameFeel.shake(0.006, 400);
      this.spawnT = 1.6;
    } else {
      hud.announce(`WAVE ${n}`, this._patternHint(this.def.pattern));
      SoundManager.waveStart();
    }
    this._updateRemain();
    this.scene.phase = Phase.FIGHTING;
  }

  // 패턴 힌트: 어떤 마법이 유리한지 판단하는 재미를 살짝 유도
  _patternHint(p) {
    return {
      scatter: '적들이 흩어져 온다',
      ring:    '포위당했다!',
      cluster: '적들이 뭉쳐서 온다',
      stream:  '한 방향에서 몰려온다',
      mixed:   '적들이 몰려온다',
    }[p] || '';
  }

  update(dt) {
    if (this.scene.phase !== Phase.FIGHTING || !this.def) return;

    if (this.isBossWave) {
      if (!this.bossSpawned) {
        this.spawnT -= dt;
        if (this.spawnT <= 0) this._spawnBoss();
      }
      return; // 종료는 GameScene.onEnemyKilled(보스 처치)에서
    }

    // 일반 웨이브: 배치 스폰
    if (this.spawned < this.def.count) {
      this.spawnT -= dt;
      if (this.spawnT <= 0) {
        this.spawnT = this.def.interval;
        const n = Math.min(this.def.batch, this.def.count - this.spawned);
        this._spawnBatch(n);
      }
    } else if (!this.finished && this.scene.enemyManager.aliveCount === 0) {
      // 웨이브 종료
      this.finished = true;
      this.scene.onWaveCleared(this.wave);
    }
  }

  notifyKill() { this._updateRemain(); }

  _updateRemain() {
    if (this.isBossWave) { this.scene.hud.setRemain(-1); return; }
    const remain = (this.def.count - this.spawned) + this.scene.enemyManager.aliveCount;
    this.scene.hud.setRemain(remain);
  }

  // ---------- 스폰 ----------
  _spawnBatch(n) {
    let pattern = this.def.pattern;
    if (pattern === 'mixed') pattern = (this.batchIdx % 2 === 0) ? 'cluster' : 'scatter';
    this.batchIdx++;

    const mods = WaveData.mods(this.wave);
    const positions = this._positions(pattern, n);
    for (const pos of positions) {
      this.scene.enemyManager.spawnGoblin(pos.x, pos.y, mods);
      this.spawned++;
    }
    this._updateRemain();
  }

  _positions(pattern, n) {
    const P = this.scene.player;
    const D = WaveData.spawnDist;
    const out = [];
    const rnd = Phaser.Math.FloatBetween;

    if (pattern === 'ring') {
      const a0 = Math.random() * Math.PI * 2;
      for (let i = 0; i < n; i++) {
        const a = a0 + (Math.PI * 2 * i) / n;
        out.push(this._clampPos(P.x + Math.cos(a) * 340, P.y + Math.sin(a) * 340));
      }
    } else if (pattern === 'cluster') {
      const a = Math.random() * Math.PI * 2;
      const cx = P.x + Math.cos(a) * 400, cy = P.y + Math.sin(a) * 400;
      for (let i = 0; i < n; i++) {
        out.push(this._clampPos(cx + rnd(-80, 80), cy + rnd(-80, 80)));
      }
    } else if (pattern === 'stream') {
      const a = Math.random() * Math.PI * 2;
      for (let i = 0; i < n; i++) {
        const d = 330 + i * 75; // 같은 방향으로 일렬 — 아이스 스피어 각
        out.push(this._clampPos(P.x + Math.cos(a) * d + rnd(-20, 20),
                                P.y + Math.sin(a) * d + rnd(-20, 20)));
      }
    } else { // scatter
      for (let i = 0; i < n; i++) {
        const a = Math.random() * Math.PI * 2;
        const d = rnd(D.min, D.max);
        out.push(this._clampPos(P.x + Math.cos(a) * d, P.y + Math.sin(a) * d));
      }
    }

    // 플레이어와 최소 안전거리 보장 (경계 클램프로 가까워진 경우 밀어냄)
    for (const p of out) {
      const dx = p.x - P.x, dy = p.y - P.y;
      const d = Math.hypot(dx, dy);
      if (d < D.safe && d > 0.01) {
        p.x = P.x + (dx / d) * D.safe;
        p.y = P.y + (dy / d) * D.safe;
        const c = this._clampPos(p.x, p.y);
        p.x = c.x; p.y = c.y;
      }
    }
    return out;
  }

  _clampPos(x, y) {
    const F = BalanceData.field, m = 40;
    return { x: Phaser.Math.Clamp(x, m, F.width - m), y: Phaser.Math.Clamp(y, m, F.height - m) };
  }

  // ---------- 보스 ----------
  _spawnBoss() {
    this.bossSpawned = true;
    const P = this.scene.player;
    const pos = this._clampPos(P.x, P.y - 460);
    this.boss = this.scene.enemyManager.spawnBoss(pos.x, pos.y);
    this.scene.hud.showBossBar(EnemyData.goblinKing.name);
    this.scene.gameFeel.shake(0.008, 300);
    SoundManager.bossGrowl();
  }

  // 보스가 부하 소환 요청 (BossGoblinKing._ai에서 호출)
  bossSummon(boss) {
    const D = boss.data0;
    const room = D.summonCap - this.scene.enemyManager.minionCount;
    const n = Math.min(D.summonCount, Math.max(0, room));
    if (n <= 0) return;
    const mods = WaveData.mods(this.totalWaves);
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const p = this._clampPos(boss.x + Math.cos(a) * 120, boss.y + Math.sin(a) * 120);
      this.scene.enemyManager.spawnGoblin(p.x, p.y, mods);
      this.scene.fxBurst.emitParticleAt(p.x, p.y, 6);
    }
    SoundManager.summon();
  }
}


// ===== js/managers/SkillManager.js =====
// ============================================================
// SkillManager — 강화 선택/적용 [Task #7: 레벨 + 진화 조건]
//
// pickThree(): 최고 레벨이 아닌 강화 중 3개 무작위 제시
// apply(u):    레벨 +1 적용. 최고 레벨 도달 + evolution 정의 시
//              → "각성" 보너스 즉시 적용 + pendingEvolutions 기록
//              (진짜 진화 마법 교체는 다음 Task에서 이 기록을 소비)
// ============================================================
class SkillManager {
  constructor(scene) { this.scene = scene; }

  levelOf(id) {
    return (GameState.run && GameState.run.upgradeLevels[id]) || 0;
  }

  available() {
    const book = this.scene.player && this.scene.player.magicBook;
    return UpgradeData.list.filter(u => {
      if (this.levelOf(u.id) >= u.maxLevel) return false;
      if (!book) return !u.learn && !u.magicKey ? true : true;
      // 마법 습득: 아직 없는 마법만
      if (u.learn) return !book.owns(u.magicKey);
      // 마법 연마: 보유한 마법만
      if (u.magicKey) return book.owns(u.magicKey);
      return true; // 공용 스탯
    });
  }

  pickThree() {
    const pool = this.available();
    const picks = Phaser.Utils.Array.Shuffle([...pool]).slice(0, 3);
    // 습득 가능한 마법이 있으면 최소 1장은 습득 카드가 뜨도록 (성장 체감)
    const learnable = pool.filter(u => u.learn);
    if (learnable.length && !picks.some(u => u.learn)) {
      picks[picks.length - 1] = Phaser.Utils.Array.GetRandom(learnable);
    }
    return picks;
  }

  // 선택 적용. 반환: { level, awakened } — UI 연출용
  apply(upgrade) {
    const run = GameState.run;
    const lv = this.levelOf(upgrade.id) + 1;
    run.upgradeLevels[upgrade.id] = lv;
    run.upgrades.push(upgrade.id);
    upgrade.apply(run);

    let awakened = false;
    if (lv === upgrade.maxLevel && upgrade.evolution) {
      awakened = true;
      if (upgrade.evolution.bonus) upgrade.evolution.bonus(run);
      run.pendingEvolutions.push(upgrade.evolution.id);
    }
    return { level: lv, awakened };
  }
}


// ===== js/ui/VirtualJoystick.js =====
// ============================================================
// VirtualJoystick — 플로팅 조이스틱 [Task #3]
// - 화면 아무 곳이나 터치한 지점에 스틱 생성 (엄지 위치 자유)
// - 아날로그 입력: 기울인 정도(0~1)에 따라 이동 속도 조절
// - 손가락을 떼면 즉시 중립 + 스틱 페이드아웃
// - 멀티터치 안전: 스틱을 생성한 포인터만 추적
// ============================================================
class VirtualJoystick {
  constructor(scene) {
    this.scene = scene;
    this.vector = { x: 0, y: 0 };   // 정규화된 입력 (길이 0~1)
    this.pointerId = null;
    this.baseX = 0; this.baseY = 0;

    this.MAX_DIST = 52;   // 노브 최대 거리(px)
    this.DEAD_ZONE = 8;   // 데드존(px)

    // 비주얼 (화면 고정)
    this.gfx = scene.add.container(0, 0).setScrollFactor(0).setDepth(90).setAlpha(0);
    const base = scene.add.circle(0, 0, 56, 0xffffff, 0.08)
      .setStrokeStyle(2, 0xffffff, 0.25);
    this.knob = scene.add.circle(0, 0, 24, 0xffffff, 0.22)
      .setStrokeStyle(2, 0xffffff, 0.4);
    this.gfx.add([base, this.knob]);

    scene.input.addPointer(2); // 멀티터치 허용

    scene.input.on('pointerdown', (p) => {
      if (this.pointerId !== null) return;          // 이미 다른 손가락이 사용 중
      if (p.event && p.event.uiHandled) return;     // UI 버튼이 소비한 입력 무시
      this.pointerId = p.id;
      this.baseX = p.x; this.baseY = p.y;
      this.gfx.setPosition(p.x, p.y);
      this.knob.setPosition(0, 0);
      this.scene.tweens.killTweensOf(this.gfx);
      this.gfx.setAlpha(1);
    });

    scene.input.on('pointermove', (p) => {
      if (p.id !== this.pointerId) return;
      this._updateVector(p.x, p.y);
    });

    const release = (p) => {
      if (p.id !== this.pointerId) return;
      this.pointerId = null;
      this.vector.x = 0; this.vector.y = 0;         // 즉시 중립
      this.scene.tweens.add({ targets: this.gfx, alpha: 0, duration: 150 });
    };
    scene.input.on('pointerup', release);
    scene.input.on('pointerupoutside', release);
  }

  _updateVector(px, py) {
    let dx = px - this.baseX, dy = py - this.baseY;
    const dist = Math.hypot(dx, dy);

    if (dist < this.DEAD_ZONE) {
      this.vector.x = 0; this.vector.y = 0;
      this.knob.setPosition(dx, dy);
      return;
    }
    const clamped = Math.min(dist, this.MAX_DIST);
    const nx = dx / dist, ny = dy / dist;
    // 아날로그 강도: 데드존~최대거리 구간을 0~1로 매핑
    const power = (clamped - this.DEAD_ZONE) / (this.MAX_DIST - this.DEAD_ZONE);
    this.vector.x = nx * power;
    this.vector.y = ny * power;
    this.knob.setPosition(nx * clamped, ny * clamped);
  }

  get active() { return this.pointerId !== null; }
}


// ===== js/ui/AttackButton.js =====
// ============================================================
// AttackButton — 오른손 공격 버튼 [Hybrid Aim + Charge]
//  짧게 탭(<HOLD, 안 움직임) → onTap()          자동 발사(약)
//  꾹 누름/드래그            → onAimUpdate(dir)  조준 + 차지 게이지 상승
//  놓음                      → onFire(dir, power) 차지량에 비례한 강샷
// ============================================================
class AttackButton {
  constructor(scene, callbacks) {
    this.scene = scene;
    this.cb = callbacks;
    this.pointerId = null;
    this.aiming = false;
    this.dir = null;
    this.startX = 0; this.startY = 0;
    this.t0 = 0;
    this.charge = 0;             // 0~1

    this.HOLD_MS = 180;          // 이 시간 넘겨 누르면 조준/차지 모드
    this.DRAG_PX = 22;           // 탭 허용 흔들림(이내면 탭). 오판정 방지 위해 넉넉히
    this.AIM_DEAD = 16;
    this.CHARGE_MS = 650;        // 완충까지 시간

    this.BOTTOM_MARGIN = 150;    // 홈 인디케이터/브라우저 하단 여백 확보
    const x = scene.scale.width - 84;
    const y = scene.scale.height - this.BOTTOM_MARGIN;
    this.root = scene.add.container(x, y).setScrollFactor(0).setDepth(95);
    this.ring = scene.add.circle(0, 0, 46, 0xffffff, 0.10).setStrokeStyle(3, 0xffe9a8, 0.5);
    this.chargeRing = scene.add.arc(0, 0, 46, 0, 0, false, 0xff9ec6, 0).setStrokeStyle(5, 0xff9ec6, 1);
    this.icon = scene.add.image(0, 0, 'missile').setScale(3.4);
    this.root.add([this.ring, this.chargeRing, this.icon]);
    scene.tweens.add({ targets: this.icon, angle: 360, duration: 6000, repeat: -1 });

    this.zone = scene.add.circle(x, y, 62, 0xffffff, 0.001)
      .setScrollFactor(0).setDepth(96).setInteractive();

    this.uiObjects = [this.root, this.zone];   // UI 카메라 등록용

    this.zone.on('pointerdown', (p) => {
      if (this.pointerId !== null) return;
      if (p.event) p.event.uiHandled = true;
      this.pointerId = p.id;
      this.startX = p.x; this.startY = p.y;
      this.t0 = scene.time.now;
      this.charge = 0;
      this.root.setScale(0.9);
    });

    scene.input.on('pointermove', (p) => {
      if (p.id !== this.pointerId) return;
      const dx = p.x - this.startX, dy = p.y - this.startY;
      const dist = Math.hypot(dx, dy);
      if (!this.aiming && dist > this.DRAG_PX) this.aiming = true;
      if (this.aiming) {
        this.dir = dist > this.AIM_DEAD ? { x: dx / dist, y: dy / dist } : null;
        this.cb.onAimUpdate(this.dir);
      }
    });

    const release = (p) => {
      if (p.id !== this.pointerId) return;
      this.root.setScale(1);
      this.chargeRing.setEndAngle(0);
      const heldMs = scene.time.now - this.t0;

      if (this.aiming) {
        // 조준(수동): 차지량 반영
        const power = 1 + this.charge;               // 1 ~ 2
        this.cb.onFire(this.dir, power, this.charge >= 0.6);
      } else if (heldMs > this.HOLD_MS) {
        // 제자리 홀드(움직이지 않고 꾹): 자동 방향 강샷
        const power = 1 + this.charge;
        this.cb.onFire(null, power, this.charge >= 0.6);
      } else {
        // 짧은 탭: 자동 발사(약)
        this.cb.onTap();
      }
      this.pointerId = null;
      this.aiming = false;
      this.dir = null;
      this.charge = 0;
    };
    scene.input.on('pointerup', release);
    scene.input.on('pointerupoutside', release);
  }

  // 화면 크기 변동 시 우하단 재배치
  reposition(w, h) {
    const x = w - 84, y = h - this.BOTTOM_MARGIN;
    this.root.setPosition(x, y);
    this.zone.setPosition(x, y);
  }

  update() {
    if (this.pointerId === null) return;
    const heldMs = this.scene.time.now - this.t0;

    // HOLD 넘기면 조준 모드로 진입(제자리 홀드 포함)
    if (!this.aiming && heldMs > this.HOLD_MS) {
      this.aiming = true;
      this.cb.onAimUpdate(this.dir);
    }
    // 차지 게이지 상승 (조준 모드에서만)
    if (this.aiming) {
      this.charge = Math.min(1, (heldMs - this.HOLD_MS) / this.CHARGE_MS);
      this.chargeRing.setEndAngle(360 * this.charge);
      const full = this.charge >= 1;
      this.chargeRing.setStrokeStyle(5, full ? 0xffe9a8 : 0xff9ec6, 1);
      this.icon.setScale(3.4 + this.charge * 0.9);
    }
  }
}


// ===== js/ui/MagicSelector.js =====
// ============================================================
// MagicSelector — 마법 전환 UI [Task #7: 습득제 반영]
// 보유한 마법만 하단 아이콘으로 표시. 습득 시 rebuild()로 재구성.
// uiObjects: UI 카메라 등록용(메인 카메라가 무시하도록 GameScene이 사용).
// ============================================================
class MagicSelector {
  constructor(scene, magicBook, onChange) {
    this.scene = scene;
    this.book = magicBook;
    this.onChange = onChange;
    this.icons = { magicMissile: 'missile', fireball: 'fireball', iceSpear: 'icespear', chainLightning: 'bolt' };
    this.buttons = [];
    this.uiObjects = [];
    this.build();
  }

  build() {
    const scene = this.scene;
    const keys = this.book.keys;
    const n = keys.length;
    const gap = 64;
    const startX = scene.scale.width / 2 - (gap * (n - 1)) / 2;
    const y = scene.scale.height - 72;   // 홈 인디케이터 여백 확보 (was -44)

    keys.forEach((key, i) => {
      const x = startX + i * gap;
      const cont = scene.add.container(x, y).setScrollFactor(0).setDepth(97);
      const bg = scene.add.circle(0, 0, 26, 0x2a1f45, 0.85).setStrokeStyle(2, 0x6f5aa8, 0.6);
      const icon = scene.add.image(0, 0, this.icons[key]).setScale(2.4);
      const num = scene.add.text(0, 20, String(i + 1), {
        fontFamily: 'monospace', fontSize: '10px', color: '#8f83b5',
      }).setOrigin(0.5).setResolution(2);
      cont.add([bg, icon, num]);

      const zone = scene.add.circle(x, y, 30, 0xffffff, 0.001)
        .setScrollFactor(0).setDepth(98).setInteractive();
      zone.on('pointerdown', (p) => {
        if (p.event) p.event.uiHandled = true;
        this.select(i);
      });

      this.buttons.push({ cont, bg, icon, key });
      this.uiObjects.push(cont, zone);
    });

    // 활성 유지 (재구성 시 현재 활성 마법으로)
    const activeKey = this.book.active.data.__key;
    const idx = Math.max(0, keys.indexOf(activeKey));
    this.select(idx, true);
  }

  // 마법 습득 후 재구성 (등장 연출: 새 아이콘이 톡 튀어나옴)
  rebuild() {
    for (const o of this.uiObjects) if (o && o.destroy) o.destroy();
    this.buttons = [];
    this.uiObjects = [];
    this.build();
    if (this.scene.registerUI) this.uiObjects.forEach(o => this.scene.registerUI(o));
    // 새로 습득한(마지막) 아이콘 팝
    const last = this.buttons[this.buttons.length - 1];
    if (last) {
      last.cont.setScale(0.1);
      this.scene.tweens.add({ targets: last.cont, scaleX: 1, scaleY: 1, duration: 320, ease: 'Back.Out' });
    }
  }

  // 화면 크기 변동 시 버튼 재배치 (재구성 없이 위치만 이동)
  reposition(w, h) {
    const n = this.buttons.length;
    const gap = 64;
    const startX = w / 2 - (gap * (n - 1)) / 2;
    const y = h - 72;
    this.buttons.forEach((b, i) => {
      const x = startX + i * gap;
      b.cont.setPosition(x, y);
    });
    // zone은 uiObjects에 cont와 교차 저장됨: [cont0, zone0, cont1, zone1, ...]
    for (let i = 0; i < this.buttons.length; i++) {
      const x = startX + i * gap;
      const zone = this.uiObjects[i * 2 + 1];
      if (zone && zone.setPosition) zone.setPosition(x, y);
    }
  }

  select(i, silent = false) {
    this.book.setActive(i);
    this.buttons.forEach((b, idx) => {
      const on = idx === i;
      b.bg.setStrokeStyle(on ? 3 : 2, on ? 0xffe9a8 : 0x6f5aa8, on ? 1 : 0.6);
      b.bg.setFillStyle(on ? 0x3a2a5a : 0x2a1f45, on ? 0.95 : 0.85);
      b.cont.setScale(on ? 1.15 : 1);
      b.icon.setAlpha(on ? 1 : 0.7);
    });
    if (!silent && this.onChange) this.onChange(this.book.active);
  }
}


// ===== js/ui/HUD.js =====
// ============================================================
// HUD — 상단 정보 [Task #7 확장]
//   웨이브 표시 / 남은 적 / HP바 / 처치 수
//   announce(배너) / countdown(다음 웨이브 카운트) / 보스 HP바 / toast
// ============================================================
class HUD extends Phaser.GameObjects.Container {
  constructor(scene) {
    super(scene, 0, 0);
    scene.add.existing(this);
    this.setScrollFactor(0).setDepth(100);
    const w = scene.scale.width;
    const h = scene.scale.height;

    this.waveLabel = scene.add.text(w / 2, 40, '', {
      fontFamily: 'monospace', fontSize: '18px', color: '#ffe9a8', fontStyle: 'bold',
    }).setOrigin(0.5);
    this.add(this.waveLabel);

    // 남은 적 (웨이브 라벨 아래)
    this.remainText = scene.add.text(w / 2, 62, '', {
      fontFamily: 'monospace', fontSize: '12px', color: '#8f83b5',
    }).setOrigin(0.5);
    this.add(this.remainText);

    // HP 바 (좌상단, 노치 피해 아래로)
    this.hpBarBg = scene.add.graphics();
    this.hpBar = scene.add.graphics();
    this.hpText = scene.add.text(20, 78, '', {
      fontFamily: 'monospace', fontSize: '12px', color: '#ffffff',
    }).setOrigin(0, 0.5);
    this.add([this.hpBarBg, this.hpBar, this.hpText]);

    // 처치 수 (우상단)
    this.killText = scene.add.text(w - 20, 78, '', {
      fontFamily: 'monospace', fontSize: '14px', color: '#c9f2d0',
    }).setOrigin(1, 0.5);
    this.add(this.killText);

    // 보스 HP 바 (필요 시 표시)
    this.bossName = scene.add.text(w / 2, 100, '', {
      fontFamily: 'monospace', fontSize: '14px', color: '#ff9e9e', fontStyle: 'bold',
    }).setOrigin(0.5).setVisible(false);
    this.bossBarBg = scene.add.graphics();
    this.bossBar = scene.add.graphics();
    this.add([this.bossName, this.bossBarBg, this.bossBar]);
    this._bossVisible = false;

    // 배너 (웨이브 시작 등 큰 알림)
    this.banner = scene.add.text(w / 2, h * 0.32, '', {
      fontFamily: 'monospace', fontSize: '40px', color: '#ffe9a8', fontStyle: 'bold',
      stroke: '#2b2140', strokeThickness: 8,
    }).setOrigin(0.5).setAlpha(0);
    this.bannerSub = scene.add.text(w / 2, h * 0.32 + 42, '', {
      fontFamily: 'monospace', fontSize: '16px', color: '#c9f2d0',
      stroke: '#2b2140', strokeThickness: 5,
    }).setOrigin(0.5).setAlpha(0);
    this.add([this.banner, this.bannerSub]);

    // 카운트다운 (다음 웨이브 시작)
    this.countText = scene.add.text(w / 2, h * 0.40, '', {
      fontFamily: 'monospace', fontSize: '72px', color: '#7ee8ff', fontStyle: 'bold',
      stroke: '#2b2140', strokeThickness: 10,
    }).setOrigin(0.5).setAlpha(0);
    this.add(this.countText);

    // 토스트 (마법 전환 등 작은 알림)
    this.toastText = scene.add.text(w / 2, h - 92, '', {
      fontFamily: 'monospace', fontSize: '14px', color: '#c9f2d0',
      stroke: '#2b2140', strokeThickness: 4,
    }).setOrigin(0.5).setAlpha(0);
    this.add(this.toastText);
  }

  setWaveNum(n, total) { this.waveLabel.setText(`WAVE ${n} / ${total}`); }

  setRemain(n) {
    this.remainText.setText(n < 0 ? '' : `남은 적 ${n}`);
  }

  setHp(hp, max) {
    const x = 20, y = 72, w = 160, h = 14;
    this.hpBarBg.clear().fillStyle(0x2b2140, 0.85).fillRect(x - 2, y - 2, w + 4, h + 4);
    const ratio = Math.max(0, hp / max);
    const col = ratio > 0.5 ? 0x6fdc8c : (ratio > 0.25 ? 0xffcc55 : 0xff6b6b);
    this.hpBar.clear().fillStyle(col, 1).fillRect(x, y, w * ratio, h);
    this.hpText.setText(`HP ${Math.ceil(hp)}/${max}`).setPosition(x + w + 10, y + h / 2);
  }

  setKills(n) { this.killText.setText(`처치 ${n}`); }

  // ---------- 배너 ----------
  announce(text, sub = '', color = 0xffe9a8) {
    this.banner.setText(text).setColor('#' + color.toString(16).padStart(6, '0'));
    this.bannerSub.setText(sub);
    const t = [this.banner, this.bannerSub];
    this.scene.tweens.killTweensOf(t);
    this.banner.setScale(0.6); this.bannerSub.setScale(0.6);
    this.banner.setAlpha(0); this.bannerSub.setAlpha(0);
    this.scene.tweens.add({ targets: t, alpha: 1, scale: 1, duration: 260, ease: 'Back.Out' });
    this.scene.tweens.add({ targets: t, alpha: 0, duration: 300, delay: 1300 });
  }

  // ---------- 다음 웨이브 카운트다운 ----------
  countdown(sec, onDone) {
    const step = (n) => {
      if (n <= 0) {
        this.countText.setText('GO!').setColor('#6fdc8c');
        SoundManager.countGo();
        this.scene.tweens.add({ targets: this.countText, alpha: 0, scale: 1.4, duration: 340 });
        onDone();
        return;
      }
      this.countText.setText(String(n)).setColor('#7ee8ff').setAlpha(1).setScale(1.3);
      SoundManager.countTick();
      this.scene.tweens.add({ targets: this.countText, scale: 1, duration: 240, ease: 'Cubic.Out' });
      this.scene.time.delayedCall(1000, () => step(n - 1));
    };
    step(sec);
  }

  // ---------- 보스 HP ----------
  showBossBar(name) {
    this._bossVisible = true;
    this.bossName.setText(name).setVisible(true);
    this.setBossHp(1);
  }
  setBossHp(ratio) {
    if (!this._bossVisible) return;
    const w = 240, h = 10;
    const x = this.scene.scale.width / 2 - w / 2, y = 112;
    this.bossBarBg.clear().fillStyle(0x2b2140, 0.85).fillRect(x - 2, y - 2, w + 4, h + 4);
    this.bossBar.clear().fillStyle(0xff5a5a, 1).fillRect(x, y, w * Math.max(0, ratio), h);
  }
  hideBossBar() {
    this._bossVisible = false;
    this.bossName.setVisible(false);
    this.bossBarBg.clear();
    this.bossBar.clear();
  }

  // ---------- 토스트 ----------
  toast(text) {
    this.toastText.setText(text);
    this.scene.tweens.killTweensOf(this.toastText);
    this.toastText.setAlpha(1);
    this.scene.tweens.add({ targets: this.toastText, alpha: 0, duration: 300, delay: 800 });
  }
}


// ===== js/ui/Overlays.js =====
// ============================================================
// Overlays — 씬 전환 대신 쓰는 오버레이 [Task #7, 입력 버그 수정판]
//
// ★ 중요: 카메라가 플레이어를 따라 스크롤되므로, 상호작용(터치) 존은
//   반드시 "최상위 씬 오브젝트 + setScrollFactor(0) + 화면 절대좌표"로 만든다.
//   (컨테이너에 중첩하면 스크롤만큼 히트영역이 어긋나 탭이 빗나감)
//   => MagicSelector와 동일한, 검증된 패턴.
//
// 각 오버레이는 만든 오브젝트를 배열에 모아 두었다가 한 번에 destroy.
// ============================================================
class Overlays {
  constructor(scene) {
    this.scene = scene;
    this._items = [];   // 현재 열린 오버레이의 모든 오브젝트
  }

  _add(obj) {
    this._items.push(obj);
    if (this.scene.registerUI) this.scene.registerUI(obj); // 메인(줌) 카메라는 무시, UI 카메라만 렌더
    return obj;
  }
  _clear() {
    for (const o of this._items) {
      if (o) {
        try { this.scene.tweens.killTweensOf(o); } catch (e) {}
        if (o.destroy) o.destroy();
      }
    }
    this._items = [];
  }

  // 화면 전체를 덮는 딤 + 입력 차단막 (그 아래 UI로 입력이 새지 않게)
  _dim(baseDepth) {
    const sc = this.scene;
    const { width: w, height: h } = sc.scale;
    const dim = sc.add.rectangle(w / 2, h / 2, w, h, 0x120b1e, 0)
      .setScrollFactor(0).setDepth(baseDepth).setInteractive();
    dim.on('pointerdown', (p) => { if (p.event) p.event.uiHandled = true; });
    this._add(dim);
    sc.tweens.add({ targets: dim, fillAlpha: 0.72, duration: 220 });
    return { w, h };
  }

  // 텍스트/이미지 등 "보이기만 하는" 요소 (화면 고정)
  _fx(obj, depth) {
    obj.setScrollFactor(0).setDepth(depth);
    return this._add(obj);
  }

  // 버튼: 최상위 인터랙티브 존 + 라벨 (화면 절대좌표)
  _button(x, y, label, color, depth, onTap) {
    const sc = this.scene;
    const bw = 200, bh = 52;
    const g = sc.add.graphics().setScrollFactor(0).setDepth(depth);
    g.fillStyle(color, 1).fillRoundedRect(x - bw / 2, y - bh / 2, bw, bh, 14);
    this._add(g);
    const txt = this._fx(sc.add.text(x, y, label, {
      fontFamily: 'monospace', fontSize: '19px', color: '#1a1028', fontStyle: 'bold',
    }).setOrigin(0.5), depth + 1);

    const zone = sc.add.rectangle(x, y, bw + 16, bh + 12, 0xffffff, 0.001)
      .setScrollFactor(0).setDepth(depth + 2).setInteractive();
    zone.on('pointerdown', (p) => {
      if (p.event) p.event.uiHandled = true;
      sc.tweens.add({ targets: [g, txt], scaleX: 0.94, scaleY: 0.94, duration: 70, yoyo: true });
      sc.time.delayedCall(120, onTap);
    });
    this._add(zone);
  }

  // ============================================================
  // 강화 선택 (마법책)
  //   choices: UpgradeData 항목 배열 / onPick(choice)
  // ============================================================
  showUpgradeChoice(choices, onPick) {
    const sc = this.scene;
    this._clear();
    this._cards = [];              // 이번 선택의 카드 컨테이너 목록
    const D = 200;                 // 기본 깊이
    const { w, h } = this._dim(D);

    // 제목
    const title = this._fx(sc.add.text(w / 2, h * 0.13, '─ 마 법 책 ─', {
      fontFamily: 'monospace', fontSize: '26px', color: '#ffe9a8', fontStyle: 'bold',
    }).setOrigin(0.5).setAlpha(0), D + 5);
    const sub = this._fx(sc.add.text(w / 2, h * 0.13 + 32, '새로운 페이지를 고른다', {
      fontFamily: 'monospace', fontSize: '14px', color: '#8f83b5',
    }).setOrigin(0.5).setAlpha(0), D + 5);
    sc.tweens.add({ targets: [title, sub], alpha: 1, duration: 300, delay: 100 });

    const cardW = Math.min(w - 44, 360), cardH = 106;
    const startY = h * 0.30, gapY = cardH + 22;
    let picked = false;

    choices.forEach((u, i) => {
      const cy = startY + i * gapY;
      // --- 카드 비주얼 (컨테이너, 화면 고정) ---
      const card = this._buildCardVisual(u, w / 2, cy, cardW, cardH, D + 2);
      // 등장: 페이지 펼치기 (scaleX 0→1)
      card.setScale(0.05, 1).setAlpha(0);
      sc.tweens.add({ targets: card, scaleX: 1, alpha: 1,
        duration: 320, delay: 130 + i * 90, ease: 'Back.Out' });

      // --- 터치 존: 최상위, 화면 절대좌표 (★ 어긋남 없음) ---
      const zone = sc.add.rectangle(w / 2, cy, cardW, cardH, 0xffffff, 0.001)
        .setScrollFactor(0).setDepth(D + 8).setInteractive();
      this._add(zone);

      zone.on('pointerdown', (p) => {
        if (p.event) p.event.uiHandled = true;
        if (picked) return;
        picked = true;
        SoundManager.page();

        // 선택 연출: 나머지 카드는 접히고, 고른 카드는 빛나며 커짐
        this._cards.forEach((c, j) => {
          if (j === i) return;
          sc.tweens.add({ targets: c, scaleX: 0.05, alpha: 0, duration: 200, ease: 'Cubic.In' });
        });
        sc.tweens.add({ targets: card, scaleX: 1.06, scaleY: 1.06, duration: 160, ease: 'Cubic.Out' });
        const glow = sc.add.rectangle(w / 2, cy, cardW, cardH, 0xffffff, 0)
          .setScrollFactor(0).setDepth(D + 7);
        this._add(glow);
        sc.tweens.add({ targets: glow, fillAlpha: 0.85, duration: 130, yoyo: true });

        sc.time.delayedCall(340, () => { this._clear(); onPick(u); });
      });
    });
  }

  // 카드 1장(비주얼만). 반환: 컨테이너
  _buildCardVisual(u, x, y, cardW, cardH, depth) {
    const sc = this.scene;

    const lv = sc.skillManager.levelOf(u.id);
    const nextLv = lv + 1;
    const awakens = !!(u.evolution && nextLv === u.maxLevel);

    const cont = sc.add.container(x, y).setScrollFactor(0).setDepth(depth);
    this._add(cont);
    this._cards.push(cont);

    const g = sc.add.graphics();
    const border = awakens ? 0xffd23f : 0x6f5aa8;
    g.fillStyle(0x241a3d, 0.97).fillRoundedRect(-cardW / 2, -cardH / 2, cardW, cardH, 12);
    g.lineStyle(awakens ? 3 : 2, border, awakens ? 1 : 0.8)
      .strokeRoundedRect(-cardW / 2, -cardH / 2, cardW, cardH, 12);
    cont.add(g);

    // 아이콘
    const iconX = -cardW / 2 + 42;
    cont.add(sc.add.circle(iconX, 0, 26, 0x1a1028, 1)
      .setStrokeStyle(2, u.icon.type === 'magic' ? 0x8f83b5 : u.icon.color, 0.9));
    if (u.icon.type === 'magic') {
      cont.add(sc.add.image(iconX, 0, u.icon.tex).setScale(3));
    } else {
      cont.add(sc.add.text(iconX, 0, u.icon.text, {
        fontFamily: 'monospace', fontSize: '20px', fontStyle: 'bold',
        color: '#' + u.icon.color.toString(16).padStart(6, '0'),
      }).setOrigin(0.5));
    }

    // 이름
    const tx = -cardW / 2 + 82;
    cont.add(sc.add.text(tx, -cardH / 2 + 18, u.name, {
      fontFamily: 'monospace', fontSize: '18px', color: awakens ? '#ffd23f' : '#ffffff', fontStyle: 'bold',
    }).setOrigin(0, 0.5));

    // 레벨 점
    const pipG = sc.add.graphics();
    for (let p = 0; p < u.maxLevel; p++) {
      const px = tx + p * 16, py = -cardH / 2 + 40;
      if (p < lv) pipG.fillStyle(0xffe9a8, 1).fillCircle(px, py, 4.5);
      else if (p === lv) pipG.fillStyle(0x6fdc8c, 1).fillCircle(px, py, 5.5);
      else pipG.lineStyle(1.5, 0x8f83b5, 0.8).strokeCircle(px, py, 4.5);
    }
    cont.add(pipG);

    // 설명
    const descText = awakens
      ? `${u.desc}\n★ ${u.evolution.name} 각성! ${u.evolution.bonusDesc.replace('각성: ', '+')}`
      : u.desc;
    cont.add(sc.add.text(tx, cardH / 2 - 26, descText, {
      fontFamily: 'monospace', fontSize: '12px', color: awakens ? '#ffe9a8' : '#c9f2d0',
      wordWrap: { width: cardW - 108 }, lineSpacing: 3,
    }).setOrigin(0, 0.5).setResolution(2));

    return cont;
  }

  // ============================================================
  // 게임 오버
  // ============================================================
  showGameOver(run, onRetry, onTitle) {
    const sc = this.scene;
    this._clear();
    const D = 200;
    const { w, h } = this._dim(D);

    const msg = this._fx(sc.add.text(w / 2, h * 0.28, '쓰러졌다...', {
      fontFamily: 'monospace', fontSize: '34px', color: '#ff9ec6', fontStyle: 'bold',
    }).setOrigin(0.5).setScale(0.5).setAlpha(0), D + 5);
    sc.tweens.add({ targets: msg, scale: 1, alpha: 1, duration: 350, ease: 'Back.Out', delay: 150 });

    const stats = this._fx(sc.add.text(w / 2, h * 0.42,
      `도달 웨이브  ${run.wave} / ${WaveData.waves.length}\n처치  ${run.kills}\n점수  ${run.score}`, {
      fontFamily: 'monospace', fontSize: '17px', color: '#c9f2d0', align: 'center', lineSpacing: 10,
    }).setOrigin(0.5).setAlpha(0), D + 5);
    sc.tweens.add({ targets: stats, alpha: 1, duration: 300, delay: 450 });

    sc.time.delayedCall(700, () => {
      this._button(w / 2, h * 0.60, '다시 도전', 0x6fdc8c, D + 5, onRetry);
      this._button(w / 2, h * 0.60 + 74, '타이틀로', 0x8f83b5, D + 5, onTitle);
    });
    SoundManager.gameOver();
  }

  // ============================================================
  // 승리
  // ============================================================
  showVictory(run, onRetry, onTitle) {
    const sc = this.scene;
    this._clear();
    const D = 200;
    const { w, h } = this._dim(D);

    const msg = this._fx(sc.add.text(w / 2, h * 0.24, '스테이지 클리어!', {
      fontFamily: 'monospace', fontSize: '32px', color: '#ffd23f', fontStyle: 'bold',
    }).setOrigin(0.5).setScale(0.4).setAlpha(0), D + 5);
    sc.tweens.add({ targets: msg, scale: 1, alpha: 1, duration: 450, ease: 'Back.Out', delay: 150 });

    const slime = this._fx(sc.add.sprite(w / 2, h * 0.40, 'slime').setOrigin(0.5, 1).setScale(5).setAlpha(0), D + 4);
    sc.tweens.add({ targets: slime, alpha: 1, duration: 300, delay: 300 });
    sc.tweens.add({ targets: slime, scaleY: 4.6, scaleX: 5.3, duration: 400, yoyo: true, repeat: -1, ease: 'Sine.InOut' });

    const stats = this._fx(sc.add.text(w / 2, h * 0.52,
      `10 웨이브 완주!\n처치  ${run.kills}     점수  ${run.score}`, {
      fontFamily: 'monospace', fontSize: '17px', color: '#c9f2d0', align: 'center', lineSpacing: 10,
    }).setOrigin(0.5).setAlpha(0), D + 5);
    sc.tweens.add({ targets: stats, alpha: 1, duration: 300, delay: 550 });

    const confetti = this._fx(sc.add.particles(0, 0, 'px', {
      speed: { min: 120, max: 320 }, angle: { min: 230, max: 310 },
      scale: { start: 2.5, end: 0 }, lifespan: { min: 500, max: 900 },
      gravityY: 500, tint: [0xffd23f, 0x6fdc8c, 0x7ee8ff, 0xff9ec6], emitting: false,
    }), D + 6);
    const pop = (i) => {
      confetti.emitParticleAt(w * (0.25 + 0.5 * Math.random()), h * 0.30, 24);
      SoundManager.waveClear();
      if (i < 2) sc.time.delayedCall(450, () => pop(i + 1));
    };
    sc.time.delayedCall(400, () => pop(0));
    SoundManager.victory();

    sc.time.delayedCall(900, () => {
      this._button(w / 2, h * 0.68, '한 번 더', 0x6fdc8c, D + 5, onRetry);
      this._button(w / 2, h * 0.68 + 74, '타이틀로', 0x8f83b5, D + 5, onTitle);
    });
  }
}


// ===== js/scenes/BootScene.js =====
// ============================================================
// BootScene — 저장 로드 + 픽셀 텍스처 생성 + 로딩 연출
// ============================================================
class BootScene extends Phaser.Scene {
  constructor() { super('Boot'); }

  create() {
    // HTML 로딩 오버레이 제거 (게임 캔버스 표시 시작)
    if (typeof window !== 'undefined') window.__gameStarted = true;
    if (typeof document !== 'undefined') {
      const el = document.getElementById('loading');
      if (el) el.remove();
    }
    SaveManager.load();
    PixelArt.generateAll(this);   // 코드 정의 픽셀아트 → 텍스처

    const { width: w, height: h } = this.scale;
    this.add.text(w / 2, h / 2 - 30, '슬라임 마법사', {
      fontFamily: 'monospace', fontSize: '28px', color: '#c9f2d0',
    }).setOrigin(0.5);

    const barBg = this.add.rectangle(w / 2, h / 2 + 20, 200, 10, 0x3a2a55).setOrigin(0.5);
    const bar = this.add.rectangle(w / 2 - 100, h / 2 + 20, 0, 10, 0x66dd88).setOrigin(0, 0.5);

    this.tweens.add({
      targets: bar, width: 200, duration: 500, ease: 'Cubic.Out',
      onComplete: () => this.scene.start('Title'),
    });
  }
}


// ===== js/scenes/TitleScene.js =====
// ============================================================
// TitleScene — "작지만 완성도 높은 마법 로그라이트" 첫인상
// 짧은 루프 애니메이션(정적 이미지 대비 고완성도, 저비용):
//   · 슬라임 호흡 + 2~3초마다 눈 깜빡임 + 모자 흔들림
//   · 불/얼음/번개가 슬라임 주위를 공전 (빛나는 궤적 트레일)
//   · 마법책: 룬 마법진 회전 + 은은한 빛 + 마력 위스프 + 페이지 넘김
//   · 몸 안 마나 코어 + 마력 광채 + 별가루
// ★ 이 디테일은 타이틀 전용. 전투 화면은 단순 유지(GPT 방침).
// ============================================================
class TitleScene extends Phaser.Scene {
  constructor() { super('Title'); }

  create() {
    const { width: w, height: h } = this.scale;
    const ADD = Phaser.BlendModes.ADD;
    this.cameras.main.fadeIn(400, 20, 12, 34);

    // 시작 입력을 가장 먼저 연결 (이후 연출 코드에 문제가 있어도 시작은 항상 동작)
    this.input.once('pointerdown', () => {
      SoundManager.unlock();
      SoundManager.waveStart && SoundManager.waveStart();
      GameState.newRun();
      this.cameras.main.fadeOut(280, 20, 12, 34);
      this.cameras.main.once('camerafadeoutcomplete', () => this.scene.start('Game'));
    });

    // 연출은 실패해도 시작을 막지 않도록 보호
    try { this._buildTitle(w, h, ADD); }
    catch (e) { console.error('title fx error:', e); }
  }

  _buildTitle(w, h, ADD) {

    // 슬라임/책 중심
    const cx = w / 2;
    const slimeY = h * 0.52;
    const bookY = slimeY + 30;

    // ---------- 배경: 밤하늘 그라데이션 ----------
    this.add.rectangle(cx, h / 2, w, h, 0x140c22);
    const grad = this.add.graphics();
    for (let i = 0; i < 14; i++) {
      const c = Phaser.Display.Color.Interpolate.ColorWithColor(
        Phaser.Display.Color.ValueToColor(0x241546),
        Phaser.Display.Color.ValueToColor(0x120a20), 14, i);
      grad.fillStyle(Phaser.Display.Color.GetColor(c.r, c.g, c.b), 1);
      grad.fillRect(0, (h / 14) * i, w, h / 14 + 1);
    }

    // 중앙 마력 광채 (은은하게 맥동)
    const aura = this.add.circle(cx, slimeY - 30, 200, 0x6a3fd0, 0.22)
      .setBlendMode(ADD);
    this.tweens.add({ targets: aura, scale: 1.14, alpha: 0.30, duration: 2200,
      yoyo: true, repeat: -1, ease: 'Sine.InOut' });
    const aura2 = this.add.circle(cx, slimeY - 30, 120, 0x3fa9d0, 0.18).setBlendMode(ADD);
    this.tweens.add({ targets: aura2, scale: 1.2, alpha: 0.26, duration: 1700,
      yoyo: true, repeat: -1, ease: 'Sine.InOut', delay: 300 });

    // ---------- 별 + 별가루 ----------
    for (let i = 0; i < 60; i++) {
      const st = this.add.circle(
        Phaser.Math.Between(0, w), Phaser.Math.Between(0, h * 0.85),
        Phaser.Math.FloatBetween(0.6, 2.0), 0xfff6d8,
        Phaser.Math.FloatBetween(0.25, 0.9)).setBlendMode(ADD);
      this.tweens.add({ targets: st, alpha: 0.1, duration: Phaser.Math.Between(700, 2200),
        yoyo: true, repeat: -1, delay: Phaser.Math.Between(0, 1800) });
    }
    // 떠다니는 별가루 (위로 천천히 상승)
    this.add.particles(0, 0, 'px', {
      x: { min: 0, max: w }, y: h + 8,
      speedY: { min: -18, max: -42 }, speedX: { min: -8, max: 8 },
      scale: { start: 1.6, end: 0 }, alpha: { start: 0.9, end: 0 },
      lifespan: { min: 4200, max: 7000 }, frequency: 220,
      tint: [0xffe9a8, 0xb98cff, 0x8fe3ff, 0xffffff], blendMode: 'ADD',
    });
    // 은은한 빛의 흐름 (느리게 가로지르는 광선)
    for (let i = 0; i < 2; i++) {
      const beam = this.add.rectangle(-100, h * (0.2 + i * 0.25), 220, 3, 0xb98cff, 0.10)
        .setAngle(18).setBlendMode(ADD);
      this.tweens.add({ targets: beam, x: w + 120, duration: 9000 + i * 3000,
        repeat: -1, delay: i * 4000, ease: 'Sine.InOut' });
    }

    // ---------- 마법책 (핵심 오브젝트) ----------
    this._buildBook(cx, bookY);

    // ---------- 마법진 (슬라임 발밑, 마법사 강조) ----------
    this._buildMagicCircle(cx, slimeY + 4);

    // ---------- 슬라임 마법사 ----------
    this._buildSlime(cx, slimeY);

    // ---------- 공전 마법 (4속성: 미사일·불·얼음·번개) ----------
    this.orbs = [];
    const orbDefs = [
      { tex: 'missile',  tint: 0x7ee8ff, glow: 0xbfefff, off: 0 },
      { tex: 'fireball', tint: 0xff6b2b, glow: 0xff8a3d, off: Math.PI / 2 },
      { tex: 'icespear', tint: 0x8fe3ff, glow: 0xbfefff, off: Math.PI },
      { tex: 'bolt',     tint: 0xfff27a, glow: 0xd6b3ff, off: (Math.PI * 3) / 2 },
    ];
    orbDefs.forEach((d) => {
      const glow = this.add.circle(0, 0, 16, d.glow, 0.5).setBlendMode(ADD);
      const spr = this.add.image(0, 0, d.tex).setScale(2.6);
      const trail = this.add.particles(0, 0, 'px', {
        follow: spr, scale: { start: 2.0, end: 0 }, alpha: { start: 0.8, end: 0 },
        lifespan: 420, frequency: 22, tint: d.tint, blendMode: 'ADD',
        speed: { min: 4, max: 16 },
      });
      this.tweens.add({ targets: glow, scale: 1.3, duration: 600, yoyo: true, repeat: -1, ease: 'Sine.InOut' });
      this.orbs.push({ glow, spr, trail, off: d.off });
    });
    this.orbCx = cx; this.orbCy = slimeY - 42;
    this.orbRx = 120; this.orbRy = 46;

    // ---------- 타이틀 UI ----------
    const titleGlow = this.add.text(cx, h * 0.24, '슬라임 마법사', {
      fontFamily: 'monospace', fontSize: '42px', color: '#b98cff', fontStyle: 'bold',
    }).setOrigin(0.5).setBlendMode(ADD).setAlpha(0.5).setResolution(2);
    const title = this.add.text(cx, h * 0.24, '슬라임 마법사', {
      fontFamily: 'monospace', fontSize: '42px', color: '#e9dcff', fontStyle: 'bold',
      stroke: '#3a2064', strokeThickness: 6,
    }).setOrigin(0.5).setResolution(2);
    const subtitle = this.add.text(cx, h * 0.24 + 38, '· 마법이 자라는 로그라이트 ·', {
      fontFamily: 'monospace', fontSize: '13px', color: '#9d8fd0',
    }).setOrigin(0.5).setResolution(2);
    this.tweens.add({ targets: [title, titleGlow], y: '-=8', duration: 1600,
      yoyo: true, repeat: -1, ease: 'Sine.InOut' });
    this.tweens.add({ targets: titleGlow, alpha: 0.15, duration: 1400, yoyo: true, repeat: -1 });

    const best = GameState.persistent.bestScore;
    const bestWave = GameState.persistent.bestWave;
    if (best > 0) {
      this.add.text(cx, h * 0.66, `최고 기록  ${best}` + (bestWave ? `  ·  WAVE ${bestWave}` : ''), {
        fontFamily: 'monospace', fontSize: '15px', color: '#9d8fd0',
      }).setOrigin(0.5).setResolution(2);
    }

    const tap = this.add.text(cx, h * 0.78, '탭하여 시작', {
      fontFamily: 'monospace', fontSize: '23px', color: '#ffe9a8', fontStyle: 'bold',
      stroke: '#3a2064', strokeThickness: 5,
    }).setOrigin(0.5).setResolution(2);
    this.tweens.add({ targets: tap, alpha: 0.35, scale: 0.96, duration: 800, yoyo: true, repeat: -1, ease: 'Sine.InOut' });

    // 버전 (빌드 구분)
    this.add.text(w - 10, h - 8, 'v' + (BalanceData.version || '?'), {
      fontFamily: 'monospace', fontSize: '11px', color: '#5a4d80',
    }).setOrigin(1, 1);
  }

  // ---------- 마법책 ----------
  _buildBook(cx, by) {
    const ADD = Phaser.BlendModes.ADD;

    // 책 아래 은은한 빛
    const bookGlow = this.add.circle(cx, by + 4, 96, 0x7ea9ff, 0.22).setBlendMode(ADD);
    this.tweens.add({ targets: bookGlow, scale: 1.15, alpha: 0.32, duration: 1900,
      yoyo: true, repeat: -1, ease: 'Sine.InOut' });

    const g = this.add.graphics();
    const pw = 74, ph = 30;   // 반쪽 페이지 폭/높이
    // 표지(살짝 큰 어두운 받침)
    g.fillStyle(0x3a2358, 1);
    g.fillRoundedRect(cx - pw - 8, by - 6, (pw + 8) * 2, ph + 20, 6);
    // 좌/우 페이지 (원근감: 사다리꼴)
    g.fillStyle(0xf2e6c8, 1);
    g.beginPath();
    g.moveTo(cx - 2, by); g.lineTo(cx - pw, by + 4);
    g.lineTo(cx - pw + 6, by + ph); g.lineTo(cx - 2, by + ph - 2);
    g.closePath(); g.fillPath();
    g.beginPath();
    g.moveTo(cx + 2, by); g.lineTo(cx + pw, by + 4);
    g.lineTo(cx + pw - 6, by + ph); g.lineTo(cx + 2, by + ph - 2);
    g.closePath(); g.fillPath();
    // 페이지 라인(글 느낌)
    g.lineStyle(1, 0xcbb88f, 0.7);
    for (let i = 1; i <= 3; i++) {
      const yy = by + 4 + i * 6;
      g.lineBetween(cx - pw + 8, yy, cx - 8, yy - 1);
      g.lineBetween(cx + 8, yy - 1, cx + pw - 8, yy);
    }
    // 책등
    g.fillStyle(0x2b1a44, 1);
    g.fillRect(cx - 2, by - 2, 4, ph + 2);

    // 회전하는 룬 마법진 (책 위에 떠 있음, 원근 위해 납작한 타원)
    const rune = this.add.graphics().setBlendMode(ADD);
    const R = 26;
    rune.lineStyle(1.5, 0x8fd4ff, 0.9);
    rune.strokeCircle(0, 0, R);
    rune.strokeCircle(0, 0, R - 7);
    rune.lineStyle(1, 0xb98cff, 0.8);
    for (let i = 0; i < 12; i++) {
      const a = (Math.PI * 2 * i) / 12;
      const x1 = Math.cos(a) * (R - 7), y1 = Math.sin(a) * (R - 7);
      const x2 = Math.cos(a) * R, y2 = Math.sin(a) * R;
      rune.lineBetween(x1, y1, x2, y2);
    }
    // 삼각형 룬
    rune.lineStyle(1.2, 0xffe9a8, 0.75);
    for (let i = 0; i < 3; i++) {
      const a = (Math.PI * 2 * i) / 3;
      const b = a + (Math.PI * 2) / 3;
      rune.lineBetween(Math.cos(a) * (R - 9), Math.sin(a) * (R - 9),
                       Math.cos(b) * (R - 9), Math.sin(b) * (R - 9));
    }
    rune.setPosition(cx, by + 2).setScale(1, 0.42);
    this.tweens.add({ targets: rune, angle: 360, duration: 16000, repeat: -1 });
    this.tweens.add({ targets: rune, alpha: 0.55, duration: 1500, yoyo: true, repeat: -1, ease: 'Sine.InOut' });

    // 마력 위스프 (책에서 위로 흘러나옴)
    this.add.particles(cx, by + 6, 'px', {
      x: { min: -pw + 12, max: pw - 12 },
      speedY: { min: -26, max: -60 }, speedX: { min: -10, max: 10 },
      scale: { start: 1.8, end: 0 }, alpha: { start: 0.85, end: 0 },
      lifespan: { min: 900, max: 1600 }, frequency: 120,
      tint: [0x8fd4ff, 0xb98cff, 0xe9dcff], blendMode: 'ADD',
    });

    // 페이지 넘김 (주기적으로 한 장이 넘어감)
    const page = this.add.graphics();
    const drawPage = (scaleX) => {
      page.clear();
      page.fillStyle(0xf7eed6, 0.96);
      const pwCur = (pw - 6) * scaleX;
      page.fillRoundedRect(cx + 2, by, pwCur, ph - 2, 3);
      page.lineStyle(1, 0xcbb88f, 0.6);
      page.lineBetween(cx + 6, by + 8, cx + 2 + pwCur - 4, by + 8);
    };
    drawPage(1);
    const flip = () => {
      const proxy = { s: 1 };
      this.tweens.add({
        targets: proxy, s: -1, duration: 620, ease: 'Sine.InOut',
        onUpdate: () => drawPage(Math.abs(proxy.s)),
        onComplete: () => {
          SoundManager.page && SoundManager.page();
          this.time.delayedCall(Phaser.Math.Between(2600, 4200), flip);
        },
      });
    };
    this.time.delayedCall(2600, flip);
  }

  // ---------- 마법진 (슬라임을 감싸는 회전 룬 원) ----------
  _buildMagicCircle(cx, cy) {
    const ADD = Phaser.BlendModes.ADD;
    const mk = (R, color, alpha, ticks, tri) => {
      const gg = this.add.graphics().setBlendMode(ADD);
      gg.lineStyle(2, color, alpha);
      gg.strokeCircle(0, 0, R);
      gg.lineStyle(1, color, alpha * 0.8);
      gg.strokeCircle(0, 0, R - 8);
      // 눈금 룬
      gg.lineStyle(1.5, color, alpha * 0.9);
      for (let i = 0; i < ticks; i++) {
        const a = (Math.PI * 2 * i) / ticks;
        gg.lineBetween(Math.cos(a) * (R - 8), Math.sin(a) * (R - 8), Math.cos(a) * R, Math.sin(a) * R);
      }
      // 내부 삼각형/육각형 문양
      if (tri) {
        gg.lineStyle(1.2, color, alpha * 0.7);
        for (let k = 0; k < tri; k++) {
          const a = (Math.PI * 2 * k) / tri, b = a + (Math.PI * 2 * 2) / tri;
          gg.lineBetween(Math.cos(a) * (R - 12), Math.sin(a) * (R - 12),
                         Math.cos(b) * (R - 12), Math.sin(b) * (R - 12));
        }
      }
      gg.setPosition(cx, cy).setScale(1, 0.34);   // 바닥에 눕힌 원근
      return gg;
    };

    // 바깥 큰 원 (천천히 시계방향)
    const outer = mk(150, 0x9a7bff, 0.5, 24, 6);
    this.tweens.add({ targets: outer, angle: 360, duration: 26000, repeat: -1 });
    this.tweens.add({ targets: outer, alpha: 0.32, duration: 2400, yoyo: true, repeat: -1, ease: 'Sine.InOut' });
    // 안쪽 원 (반대 방향, 청록)
    const inner = mk(104, 0x6fd6ff, 0.55, 12, 3);
    this.tweens.add({ targets: inner, angle: -360, duration: 18000, repeat: -1 });
    this.tweens.add({ targets: inner, alpha: 0.35, duration: 1800, yoyo: true, repeat: -1, ease: 'Sine.InOut', delay: 400 });

    // 떠다니는 룬 글리프 (마법진에서 위로 피어오름)
    this.add.particles(cx, cy, 'px', {
      x: { min: -120, max: 120 }, y: { min: -8, max: 8 },
      speedY: { min: -14, max: -34 }, speedX: { min: -6, max: 6 },
      scale: { start: 1.8, end: 0 }, alpha: { start: 0.7, end: 0 },
      lifespan: { min: 1400, max: 2400 }, frequency: 260,
      tint: [0x9a7bff, 0x6fd6ff, 0xe9dcff], blendMode: 'ADD',
    });
  }

  // ---------- 슬라임 마법사 ----------
  _buildSlime(cx, sy) {
    const ADD = Phaser.BlendModes.ADD;

    // 그림자
    this.add.ellipse(cx, sy + 6, 92, 20, 0x000000, 0.28);

    // 몸통 (호흡)
    this.body = this.add.sprite(cx, sy, 'title_body').setOrigin(0.5, 1).setScale(6).setDepth(10);
    this.tweens.add({ targets: this.body, scaleY: 5.7, scaleX: 6.3, duration: 900,
      yoyo: true, repeat: -1, ease: 'Sine.InOut' });

    // 몸 안 마나 코어 (은은히 맥동 — 강한 마력 암시)
    const core = this.add.circle(cx, sy - 26, 12, 0x9fe0ff, 0.5).setBlendMode(ADD).setDepth(11);
    this.tweens.add({ targets: core, scale: 1.5, alpha: 0.75, duration: 1100,
      yoyo: true, repeat: -1, ease: 'Sine.InOut' });
    const core2 = this.add.circle(cx, sy - 26, 5, 0xffffff, 0.7).setBlendMode(ADD).setDepth(11);
    this.tweens.add({ targets: core2, alpha: 0.3, duration: 700, yoyo: true, repeat: -1 });

    // 눈 반짝임 (양 눈 위 작은 하이라이트)
    [-18, 18].forEach((dx) => {
      const sparkle = this.add.circle(cx + dx, sy - 40, 3, 0xffffff, 0.9).setBlendMode(ADD).setDepth(12);
      this.tweens.add({ targets: sparkle, scale: 1.6, alpha: 0.4, duration: 1300,
        yoyo: true, repeat: -1, ease: 'Sine.InOut', delay: dx > 0 ? 200 : 0 });
    });

    // 모자 (몸통과 별개로 살짝 흔들림) — 몸통 위에 정렬
    // title_body는 15x10, 6배 → 높이 60. 몸통 top = sy-60. 모자(15x5)는 그 위.
    const hat = this.add.sprite(cx, sy - 58, 'title_hat').setOrigin(0.5, 1).setScale(6).setDepth(13);
    hat.setAngle(-2);
    this.tweens.add({ targets: hat, angle: 3, duration: 1800, yoyo: true, repeat: -1, ease: 'Sine.InOut' });
    // 모자 끝 별 반짝임
    const hatStar = this.add.circle(cx, sy - 84, 3, 0xffe9a8, 0.9).setBlendMode(ADD).setDepth(14);
    this.tweens.add({ targets: hatStar, scale: 1.8, alpha: 0.4, duration: 900, yoyo: true, repeat: -1 });

    // 눈 깜빡임 (2~3초마다)
    const blink = () => {
      this.body.setTexture('title_body_blink');
      this.time.delayedCall(120, () => this.body.setTexture('title_body'));
      this.time.delayedCall(Phaser.Math.Between(2200, 3400), blink);
    };
    this.time.delayedCall(Phaser.Math.Between(1500, 2500), blink);
  }

  // ---------- 공전 갱신 ----------
  update(time) {
    if (!this.orbs) return;
    try { this._updateOrbs(time); } catch (e) { /* 연출 오류 무시 */ }
  }

  _updateOrbs(time) {
    const t = time / 1000;
    const speed = 0.9;
    for (const o of this.orbs) {
      const a = t * speed + o.off;
      const x = this.orbCx + Math.cos(a) * this.orbRx;
      const y = this.orbCy + Math.sin(a) * this.orbRy;
      o.spr.setPosition(x, y);
      o.glow.setPosition(x, y);
      // 뒤쪽(위)으로 돌 땐 슬라임 뒤, 앞쪽(아래)일 땐 앞
      const front = Math.sin(a) > 0;
      o.spr.setDepth(front ? 16 : 6);
      o.glow.setDepth(front ? 15 : 5);
      const sc = front ? 2.9 : 2.3;      // 앞쪽일 때 살짝 크게(원근)
      o.spr.setScale(sc);
      o.spr.rotation = a * 2;
    }
  }
}


// ===== js/scenes/GameScene.js =====
// ============================================================
// GameScene — 전투 총괄 [Task #7: Core Roguelite Loop]
//
// 한 판의 흐름 (phase 하나로 분기):
//   READY → startNextWave → FIGHTING → (전멸) → 강화 3택(UPGRADING)
//   → 카운트다운 → 다음 웨이브 ... → WAVE 10 보스 → CLEARED(승리)
//   중간에 HP 0 → GAME_OVER
// ============================================================
class GameScene extends Phaser.Scene {
  constructor() { super('Game'); }

  create() {
    const F = BalanceData.field;

    // ---- 카메라 레이어 분리 ----
    // 메인 카메라: 월드를 줌아웃해 더 넓게 보여줌 (몬스터 시야 확보)
    // UI 카메라: 줌 1 고정 → 조이스틱/버튼/HUD/오버레이가 안 줄어듦
    // worldRoot에 담긴 것만 메인이 렌더, 나머지(UI)는 UI 카메라가 렌더.
    this.worldRoot = this.add.container(0, 0);
    this._uiObjects = [];

    // ---- 필드 ----
    this.worldRoot.add(this.add.rectangle(F.width / 2, F.height / 2, F.width, F.height, 0x2c5238));
    const g = this.add.graphics({ fillStyle: { color: 0x315c3f } });
    const t = 80;
    for (let y = 0; y < F.height / t; y++)
      for (let x = 0; x < F.width / t; x++)
        if ((x + y) % 2 === 0) g.fillRect(x * t, y * t, t, t);
    this.worldRoot.add(g);
    for (let i = 0; i < 70; i++) {
      const key = Math.random() < 0.75 ? 'grass' : 'flower';
      this.worldRoot.add(this.add.image(Phaser.Math.Between(30, F.width - 30),
                     Phaser.Math.Between(30, F.height - 30), key)
        .setScale(3).setAlpha(0.9));
    }

    // ---- 파티클 이미터 ----
    const mkEmitter = (tints) => {
      const em = this.add.particles(0, 0, 'px', {
        speed: { min: 60, max: 220 }, angle: { min: 0, max: 360 },
        scale: { start: 2.2, end: 0 }, lifespan: { min: 180, max: 350 },
        tint: tints, emitting: false,
      });
      em.setDepth(25);
      this.worldRoot.add(em);
      return em;
    };
    this.fxBurst = mkEmitter([0x7ee8ff, 0xd9ffe3, 0xffe9a8]);
    this.fxEmitters = {
      magicMissile:  mkEmitter([0x7ee8ff, 0xd9ffe3]),
      fireball:      mkEmitter([0xff6b2b, 0xffd23f]),
      iceSpear:      mkEmitter([0x8fe3ff, 0xe8faff]),
      chainLightning:mkEmitter([0xfff27a, 0xb98cff]),
    };
    this.fxExplosion = this.add.particles(0, 0, 'px', {
      speed: { min: 120, max: 380 }, angle: { min: 0, max: 360 },
      scale: { start: 4.5, end: 0 }, lifespan: { min: 300, max: 620 },
      tint: [0xffffff, 0xffd23f, 0xff8a3d, 0xff5a2b, 0x7a3020],
      emitting: false,
    }).setDepth(26);
    this.worldRoot.add(this.fxExplosion);

    // ---- 매니저 조립 ----
    this.gameFeel = new GameFeelManager(this);
    this.magicManager = new MagicManager(this);
    this.enemyManager = new EnemyManager(this);
    this.waveManager = new WaveManager(this);
    this.skillManager = new SkillManager(this);
    this.overlays = new Overlays(this);

    // ---- 플레이어 + 조작 ----
    this.player = new Player(this, F.width / 2, F.height / 2 + 200);
    this.worldRoot.add(this.player);
    this.joystick = new VirtualJoystick(this);
    this.attackButton = new AttackButton(this, {
      onTap: () => {},
      onAimUpdate: (dir) => this._drawAim(dir),
      onFire: (dir, power, charged) => { this._clearAim(); this._fire(dir, power, charged); },
    });

    this.aimGfx = this.add.graphics().setDepth(20);
    this.worldRoot.add(this.aimGfx);

    // ---- 전투 콜백 (엔티티 → 씬) ----
    this.onEnemyKilled = (e) => {
      this.enemyManager.killCount++;
      if (GameState.run) { GameState.run.kills++; GameState.run.score += (e.data0.kind === 'boss') ? 200 : 10; }
      this.hud.setKills(this.enemyManager.killCount);

      if (e.data0.kind === 'boss') {
        this.hud.hideBossBar();
        this._victory();
        return;
      }
      // 웨이브 종료 판정은 WaveManager.update가 담당 (전멸 감지)
      if (this.waveManager) this.waveManager.notifyKill();
    };
    this.onPlayerHit = (dmg, fx, fy) => {
      if (this.phase === Phase.GAME_OVER || this.phase === Phase.CLEARED) return;
      const applied = this.player.takeDamage(dmg, fx, fy);
      if (applied) {
        this.gameFeel.shake(0.004, 90);
        this.gameFeel.flash(0xff4444, 90);
        SoundManager.hurt();
      }
    };
    this.onPlayerDamaged = (hp) => {
      this.hud.setHp(hp, this.player.effectiveMaxHp());
      if (hp <= 0) this._gameOver();
    };

    // ---- 카메라 ----
    this.cameras.main.setBounds(0, 0, F.width, F.height);
    this.cameras.main.startFollow(this.player, false, 0.12, 0.12);
    this.cameras.main.setZoom(BalanceData.cameraZoom || 0.7);   // 줌아웃 → 넓은 시야
    this.cameras.main.fadeIn(250, 26, 16, 40);

    // UI 전용 카메라 (줌 1). 월드는 무시하고 UI만 렌더.
    this.uiCam = this.cameras.add(0, 0, this.scale.width, this.scale.height);
    this.uiCam.setName('ui');
    this.uiCam.ignore(this.worldRoot);              // UI 카메라는 월드 안 그림
    // 화면 회전/리사이즈 시 UI 카메라 크기 + 하단 UI 재배치 (인앱 브라우저 안전)
    this._onResize = (gs) => {
      const W = gs.width, H = gs.height;
      if (this.uiCam) this.uiCam.setSize(W, H);
      if (this.attackButton) this.attackButton.reposition(W, H);
      if (this.magicSelector) this.magicSelector.reposition(W, H);
      if (this.backBtn) this.backBtn.setPosition(W - 16, 40);
    };
    this.scale.on('resize', this._onResize);
    this.events.once('shutdown', () => { this.scale.off('resize', this._onResize); });

    // ---- HUD ----
    this.hud = new HUD(this);
    this.registerUI(this.hud);
    this.player.applyBonusHp();  // 강화(bonusHp) 반영 후 HP 세팅
    this.hud.setHp(this.player.hp, this.player.effectiveMaxHp());
    this.hud.setKills(0);

    // 마법 전환 UI (HUD 이후 생성)
    this.magicSelector = new MagicSelector(this, this.player.magicBook, (magic) => {
      this.hud.toast(magic.data.name);
    });
    this.magicSelector.uiObjects.forEach(o => this.registerUI(o));

    this.fpsText = this.add.text(12, 40, '', {
      fontFamily: 'monospace', fontSize: '13px', color: '#8f83b5',
    }).setScrollFactor(0).setDepth(100);
    this.registerUI(this.fpsText);

    const backBtn = this.add.text(this.scale.width - 16, 40, '포기', {
      fontFamily: 'monospace', fontSize: '15px', color: '#8f83b5',
      backgroundColor: '#2a1f45', padding: { x: 10, y: 6 },
    }).setOrigin(1, 0.5).setScrollFactor(0).setDepth(100).setInteractive();
    this.backBtn = backBtn;
    backBtn.on('pointerdown', (p) => {
      if (p.event) p.event.uiHandled = true;
      GameState.endRun();
      this.scene.start('Title');
    });
    this.registerUI(backBtn);

    // ---- iOS 오디오 잠금 해제 ----
    this.input.once('pointerdown', () => SoundManager.unlock());

    // ---- 조작 UI(조이스틱/공격버튼) 카메라 등록 ----
    if (this.joystick.gfx) this.registerUI(this.joystick.gfx);
    if (this.attackButton.uiObjects) this.attackButton.uiObjects.forEach(o => this.registerUI(o));

    // ---- 첫 웨이브 시작 ----
    this.phase = Phase.READY;
    this.time.delayedCall(600, () => this._startNextWave());
  }

  // UI 오브젝트를 메인 카메라가 무시하도록 등록 (UI 카메라만 렌더)
  registerUI(obj) {
    if (!obj) return obj;
    this._uiObjects.push(obj);
    this.cameras.main.ignore(obj);
    return obj;
  }

  // ---------- 웨이브 진행 ----------
  _startNextWave() {
    const next = (GameState.run ? GameState.run.wave : 0) + 1;
    if (next > this.waveManager.totalWaves) { this._victory(); return; }
    this.waveManager.startWave(next);
  }

  // WaveManager가 전멸 감지 시 호출
  onWaveCleared(waveNum) {
    if (this.phase !== Phase.FIGHTING) return;
    this.phase = Phase.UPGRADING;
    this.magicManager.clearProjectiles();
    this._clearAim();

    // 점수 보너스
    if (GameState.run) GameState.run.score += WaveData.waveClearBonus * waveNum;
    this.hud.announce('WAVE CLEAR', '', 0x6fdc8c);
    SoundManager.waveClear();

    // 마지막 일반 웨이브(9) 다음은 보스 → 강화 선택 후 보스전
    this.time.delayedCall(WaveData.clearDelay * 1000, () => this._showUpgrade());
  }

  _showUpgrade() {
    const choices = this.skillManager.pickThree();
    if (choices.length === 0) { this._afterUpgrade(); return; }
    this.overlays.showUpgradeChoice(choices, (picked) => {
      try { this._applyUpgrade(picked); }
      catch (e) { console.error('upgrade error:', e); this._afterUpgrade(); }
    });
  }

  _applyUpgrade(picked) {
      const result = this.skillManager.apply(picked);

      // 마법 습득: 마법책에 페이지 추가 + 하단 UI 재구성
      if (picked.learn && picked.magicKey) {
        if (this.player.magicBook.add(picked.magicKey)) {
          this.magicSelector.rebuild();
          this.player.magicBook.setActiveByKey(picked.magicKey);
          this.magicSelector.select(this.player.magicBook.activeIndex, true);
          this.hud.announce('새 마법!', MagicData[picked.magicKey].name, 0x7ee8ff);
          this.gameFeel.flash(0x7ee8ff, 100);
        }
      }

      // 즉시 효과: 회복형 강화
      if (picked.heal) this.player.healBy(picked.heal);
      this.player.applyBonusHp();
      this.hud.setHp(this.player.hp, this.player.effectiveMaxHp());

      // 각성 연출
      if (result.awakened && picked.evolution) {
        this.hud.announce('★ 각성 ★', picked.evolution.name, 0xffd23f);
        this.gameFeel.flash(0xffd23f, 120);
        this.gameFeel.shake(0.005, 200);
      }
      this._afterUpgrade();
  }

  _afterUpgrade() {
    // 다음 웨이브 카운트다운
    this.hud.countdown(WaveData.countdown, () => this._startNextWave());
  }

  // 조준 방향 계산 (자동/수동 공통). 근접 적으로 인한 0벡터 방지(★ 차지샷 방향 버그 수정)
  _resolveDir(dir) {
    const px = this.player.x, py = this.player.y - 26;
    if (dir) {
      const dd = Math.hypot(dir.x, dir.y);
      if (dd > 0.001) return { x: dir.x / dd, y: dir.y / dd, target: null };
    }
    const target = this.enemyManager.nearest(px, py, 700);
    if (target) {
      const tx = target.x, ty = target.y - 24;
      const d = Math.hypot(tx - px, ty - py);
      if (d > 8) return { x: (tx - px) / d, y: (ty - py) / d, target };
      // 적이 몸에 겹칠 만큼 근접 → 최근 이동방향으로 발사 (엉뚱한 방향 방지)
    }
    const ld = this.player.lastDir;
    const l = Math.hypot(ld.x, ld.y) || 1;
    return { x: ld.x / l, y: ld.y / l, target };
  }

  // ---------- 발사 ----------
  _fire(dir, power = 1, charged = false) {
    if (this.phase !== Phase.FIGHTING) return;
    const magic = this.player.magicBook.active;
    if (!magic.ready) return;

    const px = this.player.x, py = this.player.y - 26;
    const aim = this._resolveDir(dir);
    const dx = aim.x, dy = aim.y;

    // 쿨다운: 전역 × 마법별 연마 × 강샷
    const mod = GameState.magicMod(magic.data.__key);
    const mul = Math.max(0.05,
      (GameState.run ? GameState.run.stats.cooldownMul : 1) * PlayerData.baseCooldownMul * mod.cdMul)
      * (charged ? 1.5 : 1);
    magic.startCooldown(mul);

    this.magicManager.cast(magic.data, px, py, dx, dy, { charged, power, chargeAmt: charged ? (power - 1) : 0 });
    this.player.castRecoil(dx, dy, charged);
    const fireSnd = magic.data.feel.sndFire;
    if (charged) SoundManager.shootBig();
    else if (SoundManager[fireSnd]) SoundManager[fireSnd]();
  }

  // ---------- 조준선 ----------
  _drawAim(dir) {
    const g = this.aimGfx; g.clear();
    const px = this.player.x, py = this.player.y - 26;
    // 자동 조준인데 사거리 내 적이 없으면 조준선 숨김
    if (!dir) {
      const t = this.enemyManager.nearest(px, py, 700);
      if (!t) return;
    }
    const aim = this._resolveDir(dir);
    const dx = aim.x, dy = aim.y;
    const len = 300, seg = 18, gap = 12;
    g.lineStyle(4, 0x7ee8ff, dir ? 0.9 : 0.35);
    for (let s = 30; s < len; s += seg + gap) {
      g.lineBetween(px + dx * s, py + dy * s,
                    px + dx * Math.min(s + seg, len), py + dy * Math.min(s + seg, len));
    }
    const ex = px + dx * len, ey = py + dy * len;
    const a = Math.atan2(dy, dx);
    g.fillStyle(0x7ee8ff, dir ? 0.9 : 0.35);
    g.fillTriangle(
      ex + Math.cos(a) * 16, ey + Math.sin(a) * 16,
      ex + Math.cos(a + 2.5) * 12, ey + Math.sin(a + 2.5) * 12,
      ex + Math.cos(a - 2.5) * 12, ey + Math.sin(a - 2.5) * 12,
    );
  }
  _clearAim() { this.aimGfx.clear(); }

  // ---------- 결과 ----------
  _gameOver() {
    if (this.phase === Phase.GAME_OVER || this.phase === Phase.CLEARED) return;
    this.phase = Phase.GAME_OVER;
    this.gameFeel.shake(0.01, 300);
    this._clearAim();
    const run = GameState.run;
    this.time.delayedCall(500, () => {
      this.overlays.showGameOver(run,
        () => { GameState.endRun(); GameState.newRun(); this.scene.restart(); },
        () => { GameState.endRun(); this.scene.start('Title'); });
    });
  }

  _victory() {
    if (this.phase === Phase.CLEARED || this.phase === Phase.GAME_OVER) return;
    this.phase = Phase.CLEARED;
    this._clearAim();
    this.gameFeel.slowMotion(0.35, 600);
    this.gameFeel.flash(0xffffff, 200);
    const run = GameState.run;
    if (run) run.score += WaveData.bossBonus;
    this.time.delayedCall(700, () => {
      this.overlays.showVictory(run,
        () => { GameState.endRun(); GameState.newRun(); this.scene.restart(); },
        () => { GameState.endRun(); this.scene.start('Title'); });
    });
  }

  // ---------- 메인 루프 ----------
  update(time, deltaMs) {
    try {
      this._update(time, deltaMs);
    } catch (e) {
      if (!this._loggedErr) { this._loggedErr = true; console.error('update error:', e); }
    }
  }

  _update(time, deltaMs) {
    const dt = Math.min(deltaMs / 1000, 1 / 20);
    this.fpsText.setText(`${Math.round(this.game.loop.actualFps)} fps`);

    switch (this.phase) {
      case Phase.READY:
      case Phase.FIGHTING:
        this.player.update(dt, this.joystick.vector);
        this.attackButton.update();

        if (!this.attackButton.aiming) {
          const magic = this.player.magicBook.active;
          if (magic.ready && this.phase === Phase.FIGHTING) {
            const px = this.player.x, py = this.player.y - 26;
            const target = this.enemyManager.nearest(px, py, 700);
            if (target) this._fire(null, 1, false);
          }
        } else {
          this._drawAim(this.attackButton.dir);
        }

        this.enemyManager.update(dt, this.player);
        this.magicManager.update(dt);
        this.waveManager.update(dt);
        break;

      case Phase.UPGRADING:
        // 강화 선택 중: 남은 연출(사망 애니메이션 등)만 갱신, 스폰/발사 정지
        this.player.update(dt, this.joystick.vector);
        this.enemyManager.update(dt, this.player);
        this.magicManager.update(dt);
        break;

      default:
        break;
    }
  }
}


// ===== js/main.js =====

// ============================================================
// main — Phaser 게임 초기화
// iPhone 세로 화면 기준. RESIZE 모드로 노치/홈바 포함 전체 사용.
// ============================================================
const config = {
  type: Phaser.AUTO,               // WebGL 우선, 미지원 시 Canvas
  parent: 'game-container',
  backgroundColor: '#1a1028',
  scale: {
    mode: Phaser.Scale.RESIZE,     // 기기 화면 크기에 맞춤
    autoCenter: Phaser.Scale.CENTER_BOTH,
  },
  physics: {
    default: 'arcade',             // 경량 물리만 사용 (Matter 금지)
    arcade: { debug: false },
  },
  render: {
    // 전역은 LINEAR(안티앨리어싱) → 한글 텍스트 선명.
    // 스프라이트는 PixelArt.generateAll에서 텍스처별 NEAREST로 픽셀 유지.
    antialias: true,
    roundPixels: true,
  },
  scene: [BootScene, TitleScene, GameScene],
};

function bootSlimeWizard() {
  if (window.__booted) return;
  if (!window.Phaser) return; // 안내 메시지는 index.html에서 처리
  window.__booted = true;
  try {
    // 픽셀아트 모드에서도 한글 텍스트가 선명하도록 모든 텍스트 해상도 상향
    const dpr = Math.min(3, Math.max(2, Math.round(window.devicePixelRatio || 2)));
    const F = Phaser.GameObjects.GameObjectFactory.prototype;
    if (F && F.text && !F.__resPatched) {
      const _text = F.text;
      F.text = function (...a) { const t = _text.apply(this, a); if (t && t.setResolution) t.setResolution(dpr); return t; };
      F.__resPatched = true;
    }
    // 게임 루프 전체를 try/catch로 감싸 트윈/파티클 등 내부 오류도 잡아 표시(+한 프레임 오류로 죽지 않게)
    if (Phaser.Game && Phaser.Game.prototype && !Phaser.Game.prototype.__stepWrapped) {
      const _step = Phaser.Game.prototype.step;
      Phaser.Game.prototype.step = function (t, d) {
        try { _step.call(this, t, d); }
        catch (e) { if (!this.__loggedStepErr) { this.__loggedStepErr = true; console.error('loop error:', e); } }
      };
      Phaser.Game.prototype.__stepWrapped = true;
    }
    new Phaser.Game(config);
  } catch (e) {
    window.__booted = false;
    var el = document.getElementById('loading');
    if (el) el.innerHTML = '<div style="font-size:34px">⚠️</div><div>실행 중 오류: ' + (e && e.message ? e.message : e) + '</div>';
    console.error('boot error:', e);
  }
}

// load 이벤트가 늦거나 안 오는 인앱 브라우저(카카오톡 등) 대응:
// DOM이 준비되면 바로 부팅하고, 혹시 몰라 load/타임아웃에서도 재시도.
if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', bootSlimeWizard);
} else {
  bootSlimeWizard();
}
window.addEventListener('load', bootSlimeWizard);
setTimeout(bootSlimeWizard, 1200);


</script>
